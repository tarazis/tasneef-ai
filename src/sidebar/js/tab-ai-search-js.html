<script>
// Depends on globals: renderPreview, onInsertClick, onToggleTranslationClick (render-helpers.html),
//   searchImlaeiClient, _buildResultsFromReferences, _resolveGroups (search-utils.html),
//   pagClear, pagReset, pagRenderPage (pagination.html),
//   window.setupTextarea (sidebar-js.html IIFE)

var _conversationMessages = [];
/** True only while an AI search RPC is in flight (not when blocked by daily quota). */
var _aiSearchAwaitingResponse = false;

var AI_DAILY_LIMIT_MESSAGE = 'Daily AI limit reached. Try again tomorrow.';
var AI_DAILY_LIMIT_ERROR_RE = /^Daily AI limit reached\. Try again tomorrow\.$/;
var AI_LIMIT_TOOLTIP_TEXT =
  'This temporary limit ensures service sustainability during our beta phase and will be increased in future updates';
/** True when daily quota is exhausted (or test simulate on); textarea stays usable, send/new chat off. */
var _aiSearchQuotaBlocked = false;

function isAiDailyLimitErrorMessage(msg) {
  return msg != null && AI_DAILY_LIMIT_ERROR_RE.test(String(msg));
}

function showAiSearchEmptyError(emptyEl, message) {
  if (!emptyEl) return;
  emptyEl.classList.remove('ai-search-empty--limit');
  emptyEl.textContent = '';
  if (isAiDailyLimitErrorMessage(message)) {
    emptyEl.classList.add('ai-search-empty--limit');
    var row = document.createElement('span');
    row.className = 'ai-search-empty-limit-row';
    var textSpan = document.createElement('span');
    textSpan.className = 'ai-search-empty-limit-text';
    textSpan.textContent = message;
    var infoWrap = document.createElement('span');
    infoWrap.className = 'ai-limit-info-wrap';
    infoWrap.setAttribute('tabindex', '0');
    infoWrap.setAttribute('role', 'img');
    infoWrap.setAttribute('aria-label', AI_LIMIT_TOOLTIP_TEXT);
    var svgNs = 'http://www.w3.org/2000/svg';
    var svg = document.createElementNS(svgNs, 'svg');
    svg.setAttribute('xmlns', svgNs);
    svg.setAttribute('viewBox', '0 -960 960 960');
    svg.setAttribute('aria-hidden', 'true');
    svg.setAttribute('focusable', 'false');
    svg.setAttribute('class', 'ai-limit-info-svg');
    var path = document.createElementNS(svgNs, 'path');
    path.setAttribute(
      'd',
      'M440-280h80v-240h-80v240Zm68.5-331.5Q520-623 520-640t-11.5-28.5Q497-680 480-680t-28.5 11.5Q440-657 440-640t11.5 28.5Q463-600 480-600t28.5-11.5ZM480-80q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm0-80q134 0 227-93t93-227q0-134-93-227t-227-93q-134 0-227 93t-93 227q0 134 93 227t227 93Zm0-320Z'
    );
    path.setAttribute('fill', 'currentColor');
    svg.appendChild(path);
    var tip = document.createElement('span');
    tip.className = 'ai-limit-info-tooltip';
    tip.textContent = AI_LIMIT_TOOLTIP_TEXT;
    infoWrap.appendChild(svg);
    row.appendChild(textSpan);
    row.appendChild(infoWrap);
    row.appendChild(tip);
    emptyEl.appendChild(row);
  } else {
    emptyEl.textContent = message;
  }
  emptyEl.classList.remove('hidden');
}

function aiSearchPanelIsDirty() {
  if (_conversationMessages.length > 0) return true;
  var resultsEl = document.getElementById('ai-search-results');
  var clarifyEl = document.getElementById('ai-search-clarify');
  var emptyEl = document.getElementById('ai-search-empty');
  if (resultsEl && resultsEl.children.length > 0) return true;
  if (clarifyEl && !clarifyEl.classList.contains('hidden')) return true;
  if (emptyEl && !emptyEl.classList.contains('hidden')) return true;
  return false;
}

function showAIQueryBar(queryPlain) {
  var bar = document.getElementById('ai-query-bar');
  var textEl = document.getElementById('ai-query-text');
  if (textEl) textEl.textContent = '\u201c' + (queryPlain || '') + '\u201d';
  if (bar) bar.classList.remove('hidden');
}

function hideAIQueryBar() {
  var bar = document.getElementById('ai-query-bar');
  var textEl = document.getElementById('ai-query-text');
  if (bar) bar.classList.add('hidden');
  if (textEl) textEl.textContent = '';
}

function updateNewChatVisibility() {
  var btn = document.getElementById('btn-new-ai-chat-inline');
  if (!btn) return;
  if (window._activeTab !== 'ai-search') {
    btn.disabled = false;
    return;
  }
  if (_aiSearchQuotaBlocked) {
    btn.disabled = true;
    return;
  }
  var busy = _aiSearchAwaitingResponse;
  btn.disabled = busy || !aiSearchPanelIsDirty();
}

/**
 * Apply quota state for the AI tab: limit warning + chrome (server is source of truth).
 * @param {boolean} allowed
 */
function applyAiSearchQuotaFromServer(allowed) {
  var queryEl = document.getElementById('ai-search-query');
  var btnSend = document.getElementById('btn-ai-search');
  var emptyEl = document.getElementById('ai-search-empty');
  var resultsEl = document.getElementById('ai-search-results');
  var clarifyEl = document.getElementById('ai-search-clarify');
  var queryBar = document.getElementById('ai-query-bar');

  _aiSearchQuotaBlocked = !allowed;
  _aiSearchAwaitingResponse = false;

  if (queryEl) queryEl.disabled = false;
  if (btnSend) btnSend.disabled = !allowed;

  if (window._activeTab !== 'ai-search') {
    updateNewChatVisibility();
    return;
  }

  if (!allowed) {
    _conversationMessages = [];
    hideAIQueryBar();
    if (typeof pagClear === 'function') pagClear('ai-search');
    if (resultsEl) resultsEl.innerHTML = '';
    if (clarifyEl) {
      clarifyEl.classList.add('hidden');
      clarifyEl.textContent = '';
    }
    hideAIWelcome();
    if (emptyEl) showAiSearchEmptyError(emptyEl, AI_DAILY_LIMIT_MESSAGE);
  } else {
    if (emptyEl && emptyEl.classList.contains('ai-search-empty--limit')) {
      emptyEl.classList.add('hidden');
      emptyEl.textContent = '';
      emptyEl.classList.remove('ai-search-empty--limit');
    }
    var idle =
      _conversationMessages.length === 0 &&
      resultsEl &&
      resultsEl.children.length === 0 &&
      clarifyEl &&
      clarifyEl.classList.contains('hidden') &&
      queryBar &&
      queryBar.classList.contains('hidden') &&
      (!emptyEl || emptyEl.classList.contains('hidden'));
    if (idle) showAIWelcome();
  }
  updateNewChatVisibility();
}

/**
 * Re-sync AI composer with server quota (new day, limit property, super user, test toggle).
 */
function refreshAiSearchComposerEnabled() {
  var queryEl = document.getElementById('ai-search-query');
  var btnSend = document.getElementById('btn-ai-search');
  if (!queryEl || !btnSend) return;
  google.script.run
    .withSuccessHandler(function (allowed) {
      applyAiSearchQuotaFromServer(!!allowed);
    })
    .withFailureHandler(function () {
      applyAiSearchQuotaFromServer(true);
    })
    .getAiSearchQuotaAllowsMore();
}
window.refreshAiSearchComposerEnabled = refreshAiSearchComposerEnabled;

function showAIWelcome() {
  var el = document.getElementById('ai-welcome');
  if (el) el.classList.remove('hidden');
}

function hideAIWelcome() {
  var el = document.getElementById('ai-welcome');
  if (el) el.classList.add('hidden');
}

function initAISearchTab() {
  var queryEl = document.getElementById('ai-search-query');
  var btnSend = document.getElementById('btn-ai-search');
  var btnNewInline = document.getElementById('btn-new-ai-chat-inline');
  var resultsEl = document.getElementById('ai-search-results');
  var clarifyEl = document.getElementById('ai-search-clarify');
  var emptyEl = document.getElementById('ai-search-empty');
  function setEnabled(enabled) {
    _aiSearchAwaitingResponse = !enabled;
    if (btnSend) btnSend.disabled = !enabled;
    if (queryEl) queryEl.disabled = !enabled;
    updateNewChatVisibility();
  }

  function clearAIResults() {
    pagClear('ai-search');
    resultsEl.innerHTML = '';
    clarifyEl.classList.add('hidden');
    clarifyEl.textContent = '';
    emptyEl.classList.remove('ai-search-empty--limit');
    emptyEl.classList.add('hidden');
    emptyEl.textContent = '';
  }

  function getLastMessages(limit) {
    if (_conversationMessages.length <= limit) return _conversationMessages.slice();
    return _conversationMessages.slice(_conversationMessages.length - limit);
  }

  function doAISearch() {
    if (_aiSearchQuotaBlocked) return;
    var query = queryEl ? queryEl.value.trim() : '';
    if (!query) return;

    queryEl.value = '';
    queryEl.style.height = 'auto';

    _conversationMessages.push({ role: 'user', content: query });
    updateNewChatVisibility();

    hideAIWelcome();
    clearAIResults();
    showAIQueryBar(query);
    updateNewChatVisibility();

    var loadingWrap = document.createElement('div');
    loadingWrap.id = 'ai-loading';
    loadingWrap.className = 'ai-search-loading';
    loadingWrap.innerHTML = '<div class="startup-spinner" aria-hidden="true"></div>';
    resultsEl.appendChild(loadingWrap);
    updateNewChatVisibility();

    setEnabled(false);

    var messagesToSend = getLastMessages(3);

    google.script.run
      .withSuccessHandler(function(response) {
        var pending = document.getElementById('ai-loading');
        if (pending) pending.remove();
        setEnabled(true);

        if (response && response.rawResponse) {
          _conversationMessages.push({ role: 'assistant', content: response.rawResponse });
        }

        handleAIResponse(response);
      })
      .withFailureHandler(function() {
        var pending = document.getElementById('ai-loading');
        if (pending) pending.remove();
        setEnabled(true);
        _conversationMessages.pop();
        updateNewChatVisibility();
        emptyEl.textContent = 'Something went wrong. Please try again.';
        emptyEl.classList.remove('hidden');
        updateNewChatVisibility();
      })
      .performAISearch(messagesToSend);
  }

  function handleAIResponse(response) {
    if (!response) {
      emptyEl.textContent = 'No response received. Please try again.';
      emptyEl.classList.remove('hidden');
      updateNewChatVisibility();
      return;
    }

    if (response.type === 'error') {
      showAiSearchEmptyError(emptyEl, response.error);
      if (isAiDailyLimitErrorMessage(response.error)) {
        _aiSearchAwaitingResponse = false;
        _aiSearchQuotaBlocked = true;
        _conversationMessages = [];
        hideAIWelcome();
        hideAIQueryBar();
        if (queryEl) queryEl.disabled = false;
        if (btnSend) btnSend.disabled = true;
      }
      updateNewChatVisibility();
      return;
    }

    if (response.type === 'clarify') {
      clarifyEl.textContent = response.message || 'Could you be more specific?';
      clarifyEl.classList.remove('hidden');
      if (queryEl) queryEl.focus();
      updateNewChatVisibility();
      return;
    }

    // Non-clarify response breaks the conversation chain
    _conversationMessages = [];

    // Arabic corpus search
    if (response.type === 'arabic_search') {
      var searchResults = searchImlaeiClient(response.query);
      if (!searchResults.length) {
        emptyEl.textContent = 'No exact matches found for that text.';
        emptyEl.classList.remove('hidden');
        updateNewChatVisibility();
        return;
      }
      pagReset('ai-search', searchResults);
      pagRenderPage('ai-search', resultsEl, emptyEl, 'No exact matches found for that text.');
      updateNewChatVisibility();
      return;
    }

    // References type
    if (response.type === 'references') {
      var groups = response.references || [];
      var cards = _resolveGroups(groups);
      if (!cards.length) {
        emptyEl.textContent = 'No verified results found. Try a different query.';
        emptyEl.classList.remove('hidden');
        updateNewChatVisibility();
        return;
      }
      pagReset('ai-search', cards);
      pagRenderPage('ai-search', resultsEl, emptyEl, 'No verified results found. Try a different query.');
      updateNewChatVisibility();
      return;
    }

    emptyEl.textContent = 'Unexpected response. Please try again.';
    emptyEl.classList.remove('hidden');
    updateNewChatVisibility();
  }

  // Suggestion chip handlers
  var chipsEl = document.getElementById('ai-welcome-chips');
  if (chipsEl) {
    chipsEl.addEventListener('click', function (e) {
      var chip = e.target.closest('.ai-chip');
      if (!chip) return;
      var chipQuery = chip.getAttribute('data-query');
      if (chipQuery && queryEl) {
        queryEl.value = chipQuery;
        doAISearch();
      }
    });
  }

  if (btnNewInline) {
    btnNewInline.addEventListener('click', function () {
      if (btnNewInline.disabled) return;
      if (typeof clearAISearch === 'function') clearAISearch();
    });
  }

  window.setupTextarea(queryEl, doAISearch);
  if (btnSend) btnSend.addEventListener('click', doAISearch);
  if (resultsEl) resultsEl.addEventListener('click', onInsertClick);
  if (resultsEl) resultsEl.addEventListener('click', onToggleTranslationClick);
}

function clearAISearch() {
  _conversationMessages = [];
  _aiSearchAwaitingResponse = false;
  pagClear('ai-search');
  var queryEl = document.getElementById('ai-search-query');
  var resultsEl = document.getElementById('ai-search-results');
  var clarifyEl = document.getElementById('ai-search-clarify');
  var emptyEl = document.getElementById('ai-search-empty');
  if (queryEl) { queryEl.value = ''; queryEl.style.height = 'auto'; queryEl.focus(); }
  if (resultsEl) resultsEl.innerHTML = '';
  if (clarifyEl) { clarifyEl.classList.add('hidden'); clarifyEl.textContent = ''; }
  if (emptyEl) {
    emptyEl.classList.remove('ai-search-empty--limit');
    emptyEl.classList.add('hidden');
    emptyEl.textContent = '';
  }
  hideAIQueryBar();
  refreshAiSearchComposerEnabled();
}
</script>
