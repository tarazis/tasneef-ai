<script>
// Depends on globals: formatState, _settings (shared-state.html),
//   buildCardHtml, buildRangeData (card-builder.html),
//   _buildAyahDataForInsert (search-utils.html)

var _largeRangeModalPending = null;

/**
 * Closes the large-range modal and removes Escape listener. Clears pending state.
 */
function closeLargeRangeModal_() {
  var el = document.getElementById('large-range-modal');
  if (el) {
    el.classList.add('hidden');
    el.setAttribute('aria-hidden', 'true');
  }
  _largeRangeModalPending = null;
  document.removeEventListener('keydown', _onLargeRangeModalKeydown_, true);
}

/**
 * @param {KeyboardEvent} e
 */
function _onLargeRangeModalKeydown_(e) {
  if (e.key === 'Escape') {
    e.preventDefault();
    largeRangeModalOnCancel_();
  }
}

/**
 * Opens the in-sidebar large-range insert confirmation (replaces window.confirm).
 * Does not set the insert button to loading; that happens after Continue.
 * @param {HTMLButtonElement} btn
 * @param {Object} rangeData
 * @param {Object} fs
 */
function openLargeRangeModal_(btn, rangeData, fs) {
  _largeRangeModalPending = { btn: btn, rangeData: rangeData, fs: fs };
  var el = document.getElementById('large-range-modal');
  if (!el) {
    _largeRangeModalPending = null;
    return;
  }
  el.classList.remove('hidden');
  el.setAttribute('aria-hidden', 'false');
  document.addEventListener('keydown', _onLargeRangeModalKeydown_, true);
  var c = document.getElementById('large-range-modal-continue');
  if (c) c.focus();
}

function largeRangeModalOnCancel_() {
  if (!_largeRangeModalPending) {
    closeLargeRangeModal_();
    return;
  }
  var btn = _largeRangeModalPending.btn;
  closeLargeRangeModal_();
  if (btn) {
    btn.disabled = false;
    btn.classList.remove('btn-loading');
  }
}

function largeRangeModalOnContinue_() {
  var p = _largeRangeModalPending;
  if (!p) return;
  var btn = p.btn;
  var rangeData = p.rangeData;
  var fs = p.fs;
  closeLargeRangeModal_();
  if (!btn || !rangeData) return;
  btn.disabled = true;
  btn.classList.add('btn-loading');
  runRangeInsertWithHandlers_(btn, rangeData, fs);
}

/**
 * @param {HTMLButtonElement} btn
 * @param {Object} rangeData
 * @param {Object} fs
 */
function runRangeInsertWithHandlers_(btn, rangeData, fs) {
  google.script.run
    .withSuccessHandler(function(result) {
      onInsertComplete_(btn, result, null);
    })
    .withFailureHandler(function(err) {
      onInsertComplete_(btn, null, err);
    })
    .insertAyahRange(rangeData, fs, _settings);
}

/**
 * True when insert succeeded with extra user-facing copy (e.g. font fallback warning).
 * @param {string} msg
 * @return {boolean}
 */
function insertResultHasAuxiliaryMessage_(msg) {
  if (!msg || typeof msg !== 'string') return false;
  if (msg === 'Ayah inserted.' || msg === 'Range inserted.') return false;
  return msg.indexOf('Ayah inserted. ') === 0 || msg.indexOf('Range inserted. ') === 0;
}

/**
 * @param {HTMLButtonElement|null} btn
 * @param {Object|null} result
 * @param {*} err
 */
function onInsertComplete_(btn, result, err) {
  if (btn) {
    btn.disabled = false;
    btn.classList.remove('btn-loading');
  }
  if (err) {
    var em = typeof window.userFacingRpcErrorMessage === 'function'
      ? window.userFacingRpcErrorMessage(err)
      : 'Insert failed.';
    if (typeof window.showSidebarToast === 'function') {
      window.showSidebarToast(em, { variant: 'error' });
    }
    console.error('Insert failed:', err);
    return;
  }
  if (result && !result.success) {
    if (typeof window.showSidebarToast === 'function') {
      window.showSidebarToast(result.message || 'Could not insert.', { variant: 'error' });
    }
    console.warn('Insert warning:', result.message);
    return;
  }
  if (result && result.success && insertResultHasAuxiliaryMessage_(result.message)) {
    if (typeof window.showSidebarToast === 'function') {
      window.showSidebarToast(result.message, { variant: 'info', durationMs: 5200 });
    }
  }
}

(function initLargeRangeInsertModal_() {
  var root = document.getElementById('large-range-modal');
  if (!root) return;
  // Backdrop click = dismiss (common SaaS pattern)
  var backdrop = document.getElementById('large-range-modal-backdrop');
  if (backdrop) {
    backdrop.addEventListener('click', function() {
      largeRangeModalOnCancel_();
    });
  }
  var cancelBtn = document.getElementById('large-range-modal-cancel');
  if (cancelBtn) {
    cancelBtn.addEventListener('click', function() {
      largeRangeModalOnCancel_();
    });
  }
  var contBtn = document.getElementById('large-range-modal-continue');
  if (contBtn) {
    contBtn.addEventListener('click', function() {
      largeRangeModalOnContinue_();
    });
  }
})();

function makeSkeleton(count) {
  var html = '';
  for (var i = 0; i < count; i++) {
    html += '<div class="skeleton-card">' +
      '<div class="skeleton-line sk-short"></div>' +
      '<div class="skeleton-line sk-arabic"></div>' +
      '<div class="skeleton-line sk-medium"></div>' +
      '<div class="skeleton-line sk-long"></div>' +
      '</div>';
  }
  return html;
}

/**
 * Preview mode: renders exactly one card into containerEl.
 * Single ayah → one card. Multiple ayahs → one combined range card.
 * Used by Insert tab always, and by AI Search for consecutive references.
 * @param {Element} containerEl
 * @param {Array<Object>} results
 */
function renderPreview(containerEl, results) {
  containerEl.innerHTML = '';
  if (!results || results.length === 0) return;

  var fs = window.getFormatState ? window.getFormatState() : formatState;
  var card = document.createElement('div');
  card.className = 'result-card';

  if (results.length === 1) {
    card.innerHTML = buildCardHtml(results[0], fs);
  } else {
    var rangeData = buildRangeData(results);
    rangeData.isRange = true;
    card.innerHTML = buildCardHtml(rangeData, fs);
  }

  containerEl.appendChild(card);
  if (typeof scheduleSettleArabicPreviewFonts === 'function') {
    scheduleSettleArabicPreviewFonts();
  }
}

/**
 * Shared insert handler for all tabs and all card types.
 * Detects range cards by the presence of data-ayah-start; rebuilds range data from
 * client caches at click time so no global state is needed and arabic-style is respected.
 */
function onInsertClick(e) {
  var btn = e.target;
  if (btn.tagName !== 'BUTTON' || !btn.classList.contains('btn-insert-result')) return;

  var fs = window.getFormatState ? window.getFormatState() : {};

  if (btn.getAttribute('data-ayah-start')) {
    var surah     = parseInt(btn.getAttribute('data-surah'), 10);
    var ayahStart = parseInt(btn.getAttribute('data-ayah-start'), 10);
    var ayahEnd   = parseInt(btn.getAttribute('data-ayah-end'), 10);
    if (!surah || !ayahStart || !ayahEnd) {
      return;
    }

    var style = _settings.arabicStyle || 'uthmani';
    var rangeItems = [];
    for (var i = ayahStart; i <= ayahEnd; i++) {
      var d = _buildAyahDataForInsert(surah, i, style);
      if (d) rangeItems.push(d);
    }

    if (!rangeItems.length) {
      return;
    }

    var rangeData = buildRangeData(rangeItems);
    var ayahCount = ayahEnd - ayahStart + 1;
    if (ayahCount > 30) {
      openLargeRangeModal_(btn, rangeData, fs);
      return;
    }

    btn.disabled = true;
    btn.classList.add('btn-loading');
    runRangeInsertWithHandlers_(btn, rangeData, fs);
    return;
  }

  btn.disabled = true;
  btn.classList.add('btn-loading');

  var surahNum = parseInt(btn.getAttribute('data-surah'), 10);
  var ayahNum  = parseInt(btn.getAttribute('data-ayah'), 10);
  if (!surahNum || !ayahNum) {
    btn.disabled = false;
    btn.classList.remove('btn-loading');
    return;
  }

  var insertStyle = _settings.arabicStyle || 'uthmani';
  var ayahData = _buildAyahDataForInsert(surahNum, ayahNum, insertStyle);
  if (!ayahData) {
    btn.disabled = false;
    btn.classList.remove('btn-loading');
    return;
  }

  google.script.run
    .withSuccessHandler(function(result) {
      onInsertComplete_(btn, result, null);
    })
    .withFailureHandler(function(err) {
      onInsertComplete_(btn, null, err);
    })
    .insertAyah(ayahData, fs, _settings);
}

/**
 * Delegated click handler for the per-card translation toggle.
 * Toggles the .translation sibling's visibility and swaps the link text.
 */
function onToggleTranslationClick(e) {
  var toggle = e.target;
  if (!toggle.classList || !toggle.classList.contains('btn-toggle-translation')) return;

  var card = toggle.closest('.result-card');
  if (!card) return;

  var translationDiv = card.querySelector('.translation');
  if (!translationDiv) return;

  if (translationDiv.classList.contains('hidden')) {
    translationDiv.classList.remove('hidden');
    toggle.textContent = 'Hide translation';
  } else {
    translationDiv.classList.add('hidden');
    toggle.textContent = 'Show translation';
  }
}
</script>
