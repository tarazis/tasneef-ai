<script>
(function() {
  'use strict';

  window._refreshDirectInsert = null;  // set by initDirectInsertTab; invoked by refreshAllResultCardPreviews (pagination.html)

  // ─── Tab Navigation ──────────────────────────────────────────────────────────

  window._activeTab = 'direct-insert';

  function initTabNav() {
    var tabBtns = document.querySelectorAll('.tab-btn');
    tabBtns.forEach(function(btn) {
      btn.addEventListener('click', function() {
        switchTab(btn.getAttribute('data-tab'));
      });
    });
    switchTab('direct-insert');
  }

  function switchTab(tabId) {
    window._activeTab = tabId;

    var tabBtns = document.querySelectorAll('.tab-btn');
    tabBtns.forEach(function(btn) {
      btn.classList.toggle('active', btn.getAttribute('data-tab') === tabId);
    });

    var panels = document.querySelectorAll('.tab-panel');
    panels.forEach(function(panel) {
      panel.classList.toggle('active', panel.id === 'panel-' + tabId);
    });

    if (tabId === 'direct-insert') {
      ensureUthmaniCache();      // no-op if already loading or loaded
      ensureTranslationCache();  // fires in parallel with uthmani fetch
    }
    if (tabId === 'exact-search') {
      ensureImlaeiCache();       // no-op if already loading or loaded
    }
    if (tabId === 'ai-search' && typeof window.refreshAiSearchComposerEnabled === 'function') {
      window.refreshAiSearchComposerEnabled();
    }

    // Show/hide new-chat button based on active tab + conversation state
    if (typeof updateNewChatVisibility === 'function') {
      updateNewChatVisibility();
    }
  }

  function setupTextarea(el, onSubmit) {
    if (!el) return;
    el.addEventListener('input', function() {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    });
    el.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        onSubmit();
      }
    });
  }
  window.setupTextarea = setupTextarea;

  // ─── Init ────────────────────────────────────────────────────────────────────

  function init() {
    window._feedbackFormUrl = '';
    var pendingInit = 8;
    function onInitDone() {
      if (--pendingInit <= 0) {
        var overlay = document.getElementById('startup-overlay');
        if (overlay) overlay.classList.add('hidden');
      }
    }

    google.script.run
      .withSuccessHandler(function(s) { onSettingsLoaded(s); onInitDone(); })
      .withFailureHandler(function() {
        if (typeof window.refreshAllResultCardPreviews === 'function') {
          window.refreshAllResultCardPreviews();
        }
        onInitDone();
      })
      .getSettings();

    google.script.run
      .withSuccessHandler(function (state) {
        if (typeof applyAiSearchQuotaFromSnapshot === 'function') {
          applyAiSearchQuotaFromSnapshot(state);
        }
        onInitDone();
      })
      .withFailureHandler(function () {
        if (typeof applyAiSearchQuotaFromSnapshot === 'function') {
          applyAiSearchQuotaFromSnapshot({
            allowed: true,
            isSuperUser: false,
            dailyLimit: 20,
            dailyLimitIncreased: false
          });
        }
        onInitDone();
      })
      .getAiSearchQuotaStateForClient();

    google.script.run
      .withSuccessHandler(function (url) {
        window._feedbackFormUrl = url ? String(url) : '';
        onInitDone();
      })
      .withFailureHandler(function () {
        window._feedbackFormUrl = '';
        onInitDone();
      })
      .getFeedbackFormUrl();

    if (typeof ensureGoogleFontsPreviewStylesheet === 'function') {
      ensureGoogleFontsPreviewStylesheet('Amiri', ['regular'], onInitDone);
    } else {
      onInitDone();
    }

    ensureUthmaniCache(onInitDone, onInitDone);
    ensureTranslationCache(onInitDone, onInitDone);
    ensureImlaeiCache(onInitDone, onInitDone);
    ensureSurahMetaCache(onInitDone, onInitDone);

    initSettings();
    initSettingsPanelHandlers();
    initTabNav();
    initDirectInsertTab();
    initExactSearchTab();
    initAISearchTab();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

})();

(function sidebarToast_() {
  'use strict';

  var TOAST_MAX_LEN = 380;
  var TOAST_DEFAULT_MS = 4400;
  var TOAST_ERROR_MS = 5600;

  function userFacingRpcErrorMessage(err) {
    if (err == null) return 'Something went wrong. Please try again.';
    if (typeof err === 'string') {
      var s = err.trim();
      return s || 'Something went wrong. Please try again.';
    }
    if (typeof err.message === 'string' && err.message.trim()) {
      return err.message.trim();
    }
    return 'Something went wrong. Please try again.';
  }

  /**
   * @param {string} message
   * @param {{ variant?: string, durationMs?: number }=} opts
   */
  function showSidebarToast(message, opts) {
    opts = opts || {};
    var variant = opts.variant === 'error' || opts.variant === 'info' || opts.variant === 'neutral'
      ? opts.variant
      : 'neutral';
    var durationBase = variant === 'error' ? TOAST_ERROR_MS : TOAST_DEFAULT_MS;
    var durationMs = typeof opts.durationMs === 'number' && opts.durationMs >= 0
      ? opts.durationMs
      : durationBase;

    var text = String(message == null ? '' : message).replace(/\s+/g, ' ').trim();
    if (!text) return;

    if (text.length > TOAST_MAX_LEN) {
      text = text.slice(0, TOAST_MAX_LEN - 1) + '\u2026';
    }

    var host = document.getElementById('sidebar-toast-host');
    if (!host) return;

    var el = document.createElement('div');
    el.className = 'sidebar-toast sidebar-toast--' + variant;

    if (variant === 'error') {
      el.setAttribute('role', 'alert');
    } else {
      el.setAttribute('role', 'status');
    }

    var strip = document.createElement('span');
    strip.className = 'sidebar-toast__strip';
    strip.setAttribute('aria-hidden', 'true');

    var p = document.createElement('p');
    p.className = 'sidebar-toast__text';
    p.textContent = text;

    el.appendChild(strip);
    el.appendChild(p);

    host.appendChild(el);

    requestAnimationFrame(function() {
      requestAnimationFrame(function() {
        el.classList.add('sidebar-toast--visible');
      });
    });

    window.setTimeout(function() {
      dismissToast_(el);
    }, durationMs);
  }

  /**
   * @param {HTMLElement} node
   */
  function dismissToast_(node) {
    if (!node.parentNode) return;
    node.classList.remove('sidebar-toast--visible');
    node.classList.add('sidebar-toast--leaving');
    var motionMs = 220;
    if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      motionMs = 30;
    }
    window.setTimeout(function() {
      if (node.parentNode) node.parentNode.removeChild(node);
    }, motionMs);
  }

  window.userFacingRpcErrorMessage = userFacingRpcErrorMessage;
  window.showSidebarToast = showSidebarToast;
})();
</script>
