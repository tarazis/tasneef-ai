<script>
/**
 * Client-side font variant helpers (keep parse logic aligned with FormatService.parseGoogleFontVariant).
 */
function parseGoogleFontVariantClient(token) {
  if (token == null || typeof token !== 'string') {
    return { weight: 400, italic: false };
  }
  var t = token.replace(/\s/g, '');
  if (t === '') return { weight: 400, italic: false };
  if (t === 'regular') return { weight: 400, italic: false };
  if (t === 'italic') return { weight: 400, italic: true };
  var italic = /italic$/i.test(t);
  if (italic) t = t.replace(/italic$/i, '');
  var w = parseInt(t, 10);
  if (!isNaN(w)) return { weight: w, italic: italic };
  return { weight: 400, italic: false };
}

/**
 * Appends Google Fonts CSS API `key` when set at sidebar render (Script Property).
 * @param {string} url
 * @return {string}
 */
function appendGoogleFontsApiKeyClient_(url) {
  if (!url) return url;
  var k = typeof window !== 'undefined' && window.__GOOGLE_FONTS_API_KEY__
    ? String(window.__GOOGLE_FONTS_API_KEY__).trim()
    : '';
  if (!k) return url;
  return url + '&key=' + encodeURIComponent(k);
}

/**
 * Builds Google Fonts CSS2 href for sidebar Arabic preview.
 * @param {string} family
 * @param {Array<string>} variantTokens
 * @return {string}
 */
function buildGoogleFontsPreviewHref(family, variantTokens) {
  var famEnc = family.replace(/ /g, '+');
  var pairSet = {};
  var hasItal = false;
  var hasRom = false;
  for (var i = 0; i < variantTokens.length; i++) {
    var p = parseGoogleFontVariantClient(variantTokens[i]);
    if (p.italic) hasItal = true;
    else hasRom = true;
    var pair = (p.italic ? 1 : 0) + ',' + p.weight;
    pairSet[pair] = true;
  }
  var pairs = Object.keys(pairSet).sort(function (a, b) {
    var aa = a.split(',');
    var bb = b.split(',');
    if (aa[0] !== bb[0]) return parseInt(aa[0], 10) - parseInt(bb[0], 10);
    return parseInt(aa[1], 10) - parseInt(bb[1], 10);
  });
  if (!hasItal) {
    var wOnly = [];
    for (var j = 0; j < pairs.length; j++) {
      wOnly.push(pairs[j].split(',')[1]);
    }
    return appendGoogleFontsApiKeyClient_('https://fonts.googleapis.com/css2?family=' + famEnc + ':wght@' +
      wOnly.join(';') + '&display=swap');
  }
  if (!hasRom) {
    var italOnly = pairs.map(function (pr) { return '1,' + pr.split(',')[1]; });
    return appendGoogleFontsApiKeyClient_('https://fonts.googleapis.com/css2?family=' + famEnc + ':ital,wght@' +
      italOnly.join(';') + '&display=swap');
  }
  return appendGoogleFontsApiKeyClient_('https://fonts.googleapis.com/css2?family=' + famEnc + ':ital,wght@' +
    pairs.join(';') + '&display=swap');
}

/**
 * Injects Google Fonts CSS for sidebar preview. Invokes onReady after the stylesheet
 * is cached (sync) or after load/error when a new link is appended.
 * @param {string} family
 * @param {Array<string>} variantTokens
 * @param {function()=} onReady
 */
function ensureGoogleFontsPreviewStylesheet(family, variantTokens, onReady) {
  var done = typeof onReady === 'function' ? onReady : function () {};
  if (!family || !variantTokens || !variantTokens.length) {
    done();
    return;
  }
  var id = 'gf-preview-' + family.replace(/[^a-zA-Z0-9]+/g, '-');
  var href = buildGoogleFontsPreviewHref(family, variantTokens);
  var existing = document.getElementById(id);
  if (existing && existing.getAttribute('data-href') === href) {
    done();
    return;
  }
  if (existing) existing.remove();
  var link = document.createElement('link');
  link.id = id;
  link.rel = 'stylesheet';
  link.href = href;
  link.setAttribute('data-href', href);
  link.onload = function () { done(); };
  link.onerror = function () { done(); };
  document.head.appendChild(link);
}

/** Matches server-side insert: Quran Arabic preview in result cards (pt / hex). */
var INSERT_PREVIEW_ARABIC_PT = 16;
var INSERT_PREVIEW_ARABIC_COLOR = '#1A1A1A';

/**
 * Inline style for Arabic preview (.arabic) from formatState.
 * Matches fixed Quran insert typography (Amiri regular; bold not used).
 * @param {Object} fs - formatState-like { fontName, fontVariant }
 * @return {string}
 */
function arabicPreviewFontStyle(fs) {
  var fam = (fs && fs.fontName) || 'Amiri';
  var safeFam = String(fam).replace(/['\\<>]/g, '');
  var p = parseGoogleFontVariantClient(fs && fs.fontVariant ? fs.fontVariant : 'regular');
  var w = p.weight;
  return "font-family:'" + safeFam + "',serif;font-weight:" + w +
    ';font-style:' + (p.italic ? 'italic' : 'normal') +
    ';font-size:' + INSERT_PREVIEW_ARABIC_PT + 'pt;color:' + INSERT_PREVIEW_ARABIC_COLOR;
}

var _settleArabicPreviewFontsTimer = null;

/**
 * Coalesces multiple preview DOM updates in one task (e.g. refreshAllResultCardPreviews).
 */
function scheduleSettleArabicPreviewFonts() {
  if (_settleArabicPreviewFontsTimer != null) {
    clearTimeout(_settleArabicPreviewFontsTimer);
  }
  _settleArabicPreviewFontsTimer = setTimeout(function() {
    _settleArabicPreviewFontsTimer = null;
    settleArabicPreviewFonts();
  }, 0);
}

/**
 * For non-Amiri preview fonts, hide Arabic lines until FontFaceSet can draw them, then fade in.
 * Amiri is local/stacked — no flash, so we skip the pending state.
 */
function settleArabicPreviewFonts() {
  var nodes = document.querySelectorAll('.result-card .arabic');
  if (!nodes.length) return;

  var fs = window.getFormatState ? window.getFormatState() : null;
  var fam = (fs && fs.fontName) || 'Amiri';
  if (fam === 'Amiri') return;

  var p = parseGoogleFontVariantClient(fs && fs.fontVariant ? fs.fontVariant : 'regular');

  var styleSpec = (p.italic ? 'italic ' : 'normal ') + p.weight + ' ' + INSERT_PREVIEW_ARABIC_PT + 'pt "' +
    String(fam).replace(/"/g, '') + '"';

  if (document.fonts && document.fonts.check && document.fonts.check(styleSpec)) {
    return;
  }

  var i;
  for (i = 0; i < nodes.length; i++) {
    nodes[i].classList.add('font-preview-pending');
  }

  function reveal() {
    var pending = document.querySelectorAll('.result-card .arabic.font-preview-pending');
    for (var j = 0; j < pending.length; j++) {
      pending[j].classList.remove('font-preview-pending');
    }
  }

  /**
   * fonts.load() can resolve slightly before the first composited frame uses the face.
   * Brief delay + double rAF nudges reveal after raster; longer CSS transition only smooths opacity.
   */
  var PREVIEW_FONT_POST_LOAD_MS = 200;

  function doReveal() {
    setTimeout(function() {
      requestAnimationFrame(function() {
        requestAnimationFrame(reveal);
      });
    }, PREVIEW_FONT_POST_LOAD_MS);
  }

  if (document.fonts && document.fonts.load) {
    document.fonts.load(styleSpec).then(doReveal, doReveal);
  } else {
    setTimeout(doReveal, 140);
  }
}
</script>
