<div class="tab-panel" id="panel-ai-search">
  <div id="ai-welcome" class="ai-welcome">
    <div class="ai-welcome-content">
      <p class="ai-welcome-greeting">What would you like to find?</p>
      <p class="ai-welcome-hint">Search the Quran by theme, topic, or meaning</p>
    </div>
    <div class="ai-welcome-chips" id="ai-welcome-chips">
      <button type="button" class="ai-chip" data-query="Verses about patience">Verses about patience</button>
      <button type="button" class="ai-chip" data-query="Ayat about gratitude">Ayat about gratitude</button>
      <button type="button" class="ai-chip" data-query="Give me Ayat Al-Kursi">Give me Ayat Al-Kursi</button>
    </div>
  </div>
  <div id="ai-query-bar" class="ai-query-bar hidden" aria-live="polite">
    <div class="ai-query-bar-main">
      <span class="ai-query-label">Results for:</span>
      <span class="ai-query-text" id="ai-query-text"></span>
    </div>
    <button type="button" class="btn-icon ai-query-bar-new-chat" id="btn-new-ai-chat-inline" title="New chat" aria-label="New chat">
      <!-- Material Symbols Outlined: edit_square (android vector from google/material-design-icons) -->
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 960" width="20" height="20" fill="currentColor" aria-hidden="true" focusable="false">
        <path d="M200,840Q167,840 143.5,816.5Q120,793 120,760L120,200Q120,167 143.5,143.5Q167,120 200,120L557,120L477,200L200,200Q200,200 200,200Q200,200 200,200L200,760Q200,760 200,760Q200,760 200,760L760,760Q760,760 760,760Q760,760 760,760L760,482L840,402L840,760Q840,793 816.5,816.5Q793,840 760,840L200,840ZM480,480Q480,480 480,480Q480,480 480,480L480,480Q480,480 480,480Q480,480 480,480L480,480L480,480L480,480L480,480L480,480L480,480Q480,480 480,480Q480,480 480,480L480,480ZM360,600L360,430L727,63Q739,51 754,45Q769,39 784,39Q800,39 814.5,45Q829,51 841,63L897,120Q908,132 914,146.5Q920,161 920,176Q920,191 914.5,205.5Q909,220 897,232L530,600L360,600ZM841,176L841,176L785,120L785,120L841,176ZM440,520L496,520L728,288L700,260L671,232L440,463L440,520ZM700,260L671,232L671,232L700,260L728,288L728,288L700,260Z"/>
      </svg>
    </button>
  </div>
  <div id="ai-search-results" class="results-list"></div>
  <div id="ai-search-clarify" class="clarify-message hidden"></div>
  <div id="ai-search-empty" class="empty-state hidden"></div>
  <div class="tab-input-area">
    <div class="tab-input-wrap tab-input-wrap--composer">
      <textarea id="ai-search-query" rows="2" placeholder="Describe the verses you're looking for..."></textarea>
      <button type="button" class="btn-send" id="btn-ai-search" title="Send" aria-label="Send">
        <!-- Material Symbols Outlined: arrow_upward (android vector from google/material-design-icons) -->
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 960" width="20" height="20" fill="currentColor" aria-hidden="true" focusable="false">
          <path d="M440,800L440,313L216,537L160,480L480,160L800,480L744,537L520,313L520,800L440,800Z"/>
        </svg>
      </button>
    </div>
    <p class="ai-disclaimer">All Quranic verses are verified for accuracy.</p>
  </div>
</div>
