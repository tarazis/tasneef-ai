<div class="tab-panel" id="panel-direct-insert">
  <div class="direct-insert-form">
    <div class="form-group">
      <label for="surah-select">Surah</label>
      <select id="surah-select" class="form-select">
        <option value="">Loading…</option>
      </select>
    </div>
    <div class="form-row">
      <div class="form-group form-group-half">
        <label for="ayah-start">Ayah</label>
        <input type="number" id="ayah-start" class="form-input" min="1" placeholder="From">
      </div>
      <div class="form-group form-group-half">
        <label for="ayah-end">To <span class="hint-inline">(optional)</span></label>
        <input type="number" id="ayah-end" class="form-input" min="1" placeholder="To">
      </div>
    </div>
    <button type="button" class="btn-primary btn-block" id="btn-direct-insert">Insert</button>
  </div>
  <div id="direct-insert-results" class="results-list"></div>
  <div id="direct-insert-empty" class="empty-state hidden"></div>
  <div id="direct-insert-loading" class="search-loading hidden">
    <span class="spinner"></span>
    <span>Fetching…</span>
  </div>
</div>
