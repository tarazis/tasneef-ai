<div class="format-bar">
  <div class="font-picker" id="font-picker">
    <button type="button" class="font-picker-trigger" id="font-picker-trigger" aria-haspopup="listbox" aria-expanded="false" title="Font">
      <span class="font-picker-label" id="font-picker-label">Amiri</span>
      <span class="font-picker-caret" aria-hidden="true">▾</span>
    </button>
    <div class="font-picker-dropdown hidden" id="font-picker-dropdown" role="listbox" aria-label="Fonts">
      <ul class="font-picker-families" id="font-picker-families"></ul>
    </div>
  </div>
  <div class="size-stepper-wrap" id="size-stepper-wrap">
    <div class="size-stepper" id="size-stepper">
      <button type="button" class="size-stepper-btn" id="btn-size-down" aria-label="Decrease font size">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true" focusable="false"><path d="M5 12h14"/></svg>
      </button>
      <button type="button" class="size-stepper-value-btn" id="size-stepper-value" aria-haspopup="listbox" aria-expanded="false" title="Font size presets" aria-label="Font size presets">18</button>
      <button type="button" class="size-stepper-btn" id="btn-size-up" aria-label="Increase font size">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true" focusable="false"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
      </button>
    </div>
    <ul class="font-size-presets-dropdown hidden" id="font-size-presets-dropdown" role="listbox" aria-label="Font size"></ul>
  </div>
  <button type="button" class="btn-format" id="btn-bold" title="Bold">B</button>
  <div class="color-wrap">
    <button type="button" class="color-trigger" id="color-trigger" title="Text color" aria-label="Text color" aria-haspopup="dialog" aria-expanded="false"></button>
    <input type="color" id="color-picker" value="#000000" title="Text color" class="color-picker-hidden">
    <div id="color-picker-popover" class="color-picker-popover hidden" role="dialog" aria-label="Text color" aria-hidden="true">
      <div id="color-swatch-grid" class="color-swatch-grid"></div>
      <div id="color-custom-row" class="color-custom-row hidden">
        <span class="color-custom-row-label">Saved colors</span>
        <div class="color-custom-row-inner">
          <div id="color-custom-swatches" class="color-custom-swatches"></div>
          <button type="button" class="color-custom-clear-btn" id="btn-clear-custom-swatches" title="Clear saved colors" aria-label="Clear saved custom colors">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true" focusable="false">
              <path d="M18 6 6 18"/>
              <path d="m6 6 12 12"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="color-picker-custom">
        <span class="color-picker-custom-label">Custom</span>
        <div class="color-picker-custom-actions">
          <button type="button" class="color-picker-icon-btn" id="btn-color-custom" title="Custom color" aria-label="Choose custom color">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true" focusable="false">
              <circle cx="12" cy="12" r="9"/>
              <path d="M12 8v8M8 12h8"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
    <div id="custom-color-dialog" class="custom-color-dialog hidden" role="dialog" aria-labelledby="custom-color-dialog-title" aria-modal="true" aria-hidden="true">
      <div class="custom-color-dialog-panel">
        <h2 class="custom-color-dialog-title" id="custom-color-dialog-title">Custom color</h2>
        <div class="custom-color-sv" id="custom-color-sv" tabindex="0" aria-label="Saturation and brightness">
          <div class="custom-color-sv-layers" id="custom-color-sv-layers"></div>
          <div class="custom-color-sv-handle" id="custom-color-sv-handle" aria-hidden="true"></div>
        </div>
        <div class="custom-color-hue-row">
          <div class="custom-color-preview" id="custom-color-preview" aria-hidden="true"></div>
          <button type="button" class="custom-color-eyedropper-btn" id="btn-custom-eyedropper" title="Pick color from screen" aria-label="Pick color from screen">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
              <path d="M4 21l6-6"/>
              <path d="M14 7l3 3"/>
              <path d="M6.5 12.5 12 7l5 5-5.5 5.5a2.12 2.12 0 0 1-3-3L6.5 12.5z"/>
              <path d="m9 10 5 5"/>
            </svg>
          </button>
          <div class="custom-color-hue-track" id="custom-color-hue-track" role="slider" aria-label="Hue" aria-valuemin="0" aria-valuemax="360" tabindex="0">
            <div class="custom-color-hue-thumb" id="custom-color-hue-thumb"></div>
          </div>
        </div>
        <div class="custom-color-fields">
          <div class="custom-color-field custom-color-field--hex">
            <label for="custom-color-hex">Hex</label>
            <input type="text" id="custom-color-hex" class="custom-color-input" spellcheck="false" autocomplete="off" maxlength="7">
          </div>
          <div class="custom-color-field">
            <label for="custom-color-r">R</label>
            <input type="text" id="custom-color-r" class="custom-color-input" inputmode="numeric" maxlength="3">
          </div>
          <div class="custom-color-field">
            <label for="custom-color-g">G</label>
            <input type="text" id="custom-color-g" class="custom-color-input" inputmode="numeric" maxlength="3">
          </div>
          <div class="custom-color-field">
            <label for="custom-color-b">B</label>
            <input type="text" id="custom-color-b" class="custom-color-input" inputmode="numeric" maxlength="3">
          </div>
        </div>
        <div class="custom-color-footer">
          <button type="button" class="custom-color-btn-cancel" id="btn-custom-cancel">Cancel</button>
          <button type="button" class="custom-color-btn-ok" id="btn-custom-ok">OK</button>
        </div>
      </div>
    </div>
  </div>
</div>
