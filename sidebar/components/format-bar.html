<div class="format-bar">
  <select class="font-select" id="font-select" title="Font">
    <option value="Amiri">Amiri</option>
  </select>
  <select class="size-select" id="size-select" title="Font size">
    <option value="12">12</option>
    <option value="14">14</option>
    <option value="16">16</option>
    <option value="18" selected>18</option>
    <option value="20">20</option>
    <option value="24">24</option>
    <option value="28">28</option>
    <option value="36">36</option>
  </select>
  <button type="button" class="btn-format" id="btn-bold" title="Bold">B</button>
  <div class="color-wrap">
    <button type="button" class="color-trigger" id="color-trigger" title="Text color" aria-label="Text color"></button>
    <input type="color" id="color-picker" value="#000000" title="Text color" class="color-picker-hidden">
  </div>
</div>
