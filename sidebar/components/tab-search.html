<div class="tab-search">
  <div class="search-input-wrap">
    <span class="search-icon">&#128269;</span>
    <input type="text" id="search-input" placeholder="Search exact words in ayah text..." autocomplete="off">
  </div>
  <button type="button" class="btn-primary" id="btn-search">Search</button>
  <div id="search-loading" class="search-loading hidden">
    <span class="spinner"></span>
    <span>Searching...</span>
  </div>
  <div id="search-results" class="results-list"></div>
  <div id="search-show-more-wrap" class="search-show-more hidden">
    <button type="button" class="btn-secondary" id="btn-search-show-more">Show more</button>
  </div>
  <div id="search-empty" class="empty-state hidden">No matching ayat found. Try a different term or use AI Search.</div>
</div>
