<div class="tab-ai">
  <div id="ai-no-key" class="empty-state hidden">
    To use AI Search, add your Claude API key in Settings.
  </div>
  <div id="ai-search-form">
    <textarea id="ai-query" placeholder="Describe what you're looking for in natural language... e.g. 'verses about Allah's mercy'"></textarea>
    <button type="button" class="btn-ai" id="btn-ai-search">Search with AI</button>
  </div>
  <div id="ai-loading" class="search-loading hidden">
    <span class="spinner"></span>
    <span>Searching with AI...</span>
  </div>
  <div id="ai-results" class="results-list"></div>
  <div id="ai-show-more-wrap" class="search-show-more hidden">
    <button type="button" class="btn-secondary" id="btn-ai-show-more">Show more</button>
  </div>
  <div id="ai-empty" class="empty-state hidden"></div>
</div>
