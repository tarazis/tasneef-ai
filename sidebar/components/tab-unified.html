<div class="unified-tab">
  <div id="unified-no-key" class="empty-state hidden">
    To use Tasneef, add your Claude API key in Settings.
  </div>
  <div id="unified-results" class="results-list"></div>
  <div id="unified-clarify" class="clarify-message hidden"></div>
  <div id="unified-empty" class="empty-state hidden"></div>
  <div id="unified-loading" class="search-loading hidden">
    <span class="spinner"></span>
    <span>Thinking...</span>
  </div>
  <div class="unified-input-area">
    <div class="unified-input-wrap">
      <textarea id="unified-query" rows="2" placeholder="Search by ayah (2:255), Arabic text, or describe what you're looking for..."></textarea>
      <button type="button" class="btn-send" id="btn-unified-send" title="Send" aria-label="Send">&#10148;</button>
    </div>
  </div>
</div>
