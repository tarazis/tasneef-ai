<script>
// Depends on: formatState, SAVE_DEBOUNCE_MS (shared-state.html),
//   pickDefaultRegularVariant, ensureGoogleFontsPreviewStylesheet, arabicPreviewFontStyle (font-variant-utils.html)
// Calls window.refreshAllResultCardPreviews (pagination.html) after format changes
// initJsColorPicker, syncJsColorPickerSelection (js-color-picker.html)

var saveDebounceTimer = null;
window._fontCatalog = null;

function updateFontPickerLabel() {
  var el = document.getElementById('font-picker-label');
  if (!el) return;
  el.textContent = formatState.fontName || 'Amiri';
}

/**
 * Ensures the Google Fonts stylesheet for the current family; calls onReady when
 * the link is already satisfied or after load/error (see ensureGoogleFontsPreviewStylesheet).
 * @param {function()=} onReady
 */
function refreshArabicPreviewFontFace(onReady) {
  var done = typeof onReady === 'function' ? onReady : function () {};
  if (!window._fontCatalog || !formatState.fontName) {
    done();
    return;
  }
  var entry = null;
  for (var i = 0; i < window._fontCatalog.length; i++) {
    if (window._fontCatalog[i].family === formatState.fontName) {
      entry = window._fontCatalog[i];
      break;
    }
  }
  if (entry && entry.variants && entry.variants.length) {
    ensureGoogleFontsPreviewStylesheet(entry.family, entry.variants, done);
  } else {
    done();
  }
}

function closeFontPicker() {
  var drop = document.getElementById('font-picker-dropdown');
  var trig = document.getElementById('font-picker-trigger');
  if (drop) drop.classList.add('hidden');
  if (trig) trig.setAttribute('aria-expanded', 'false');
  document.removeEventListener('click', onFontPickerDocClick, true);
}

function onFontSizePresetsDocClick(e) {
  var wrap = document.getElementById('size-stepper-wrap');
  if (wrap && !wrap.contains(e.target)) closeFontSizePresetsDropdown();
}

function closeFontSizePresetsDropdown() {
  var drop = document.getElementById('font-size-presets-dropdown');
  var trig = document.getElementById('size-stepper-value');
  if (drop) drop.classList.add('hidden');
  if (trig) trig.setAttribute('aria-expanded', 'false');
  document.removeEventListener('click', onFontSizePresetsDocClick, true);
}

function syncFontSizePresetSelection() {
  var items = document.querySelectorAll('.font-size-preset-item');
  var cur = formatState.fontSize;
  for (var i = 0; i < items.length; i++) {
    var btn = items[i];
    var sz = parseInt(btn.getAttribute('data-size'), 10);
    var sel = !isNaN(sz) && sz === cur;
    btn.classList.toggle('is-selected', sel);
    btn.setAttribute('aria-selected', sel ? 'true' : 'false');
  }
}

function openFontSizePresetsDropdown() {
  closeFontPicker();
  if (typeof closeJsColorPickerPopover === 'function') closeJsColorPickerPopover();
  var drop = document.getElementById('font-size-presets-dropdown');
  var trig = document.getElementById('size-stepper-value');
  if (!drop || !trig) return;
  syncFontSizePresetSelection();
  drop.classList.remove('hidden');
  trig.setAttribute('aria-expanded', 'true');
  setTimeout(function () {
    document.addEventListener('click', onFontSizePresetsDocClick, true);
  }, 0);
}

function toggleFontSizePresetsDropdown() {
  var drop = document.getElementById('font-size-presets-dropdown');
  if (!drop) return;
  if (drop.classList.contains('hidden')) openFontSizePresetsDropdown();
  else closeFontSizePresetsDropdown();
}

function onFontPickerDocClick(e) {
  var picker = document.getElementById('font-picker');
  if (picker && !picker.contains(e.target)) closeFontPicker();
}

function openFontPicker() {
  closeFontSizePresetsDropdown();
  if (typeof closeJsColorPickerPopover === 'function') closeJsColorPickerPopover();
  var drop = document.getElementById('font-picker-dropdown');
  var trig = document.getElementById('font-picker-trigger');
  if (!drop || !trig) return;
  syncFontPickerSelectionClasses();
  drop.classList.remove('hidden');
  trig.setAttribute('aria-expanded', 'true');
  setTimeout(function() {
    document.addEventListener('click', onFontPickerDocClick, true);
  }, 0);
}

function toggleFontPicker() {
  var drop = document.getElementById('font-picker-dropdown');
  if (!drop) return;
  if (drop.classList.contains('hidden')) openFontPicker();
  else closeFontPicker();
}

function syncFontPickerSelectionClasses() {
  var fam = formatState.fontName || '';
  var items = document.querySelectorAll('.font-picker-family-item');
  for (var i = 0; i < items.length; i++) {
    var li = items[i];
    var liFam = li.getAttribute('data-font-family') || '';
    var familySelected = liFam === fam;
    li.classList.toggle('is-selected', familySelected);
    li.setAttribute('aria-selected', familySelected ? 'true' : 'false');
  }
}

function selectFontAndVariant(family, variant, closeMenu) {
  formatState.fontName = family;
  formatState.fontVariant = variant || 'regular';
  updateFontPickerLabel();
  syncFontPickerSelectionClasses();
  debouncedSave();
  if (closeMenu) closeFontPicker();
  refreshArabicPreviewFontFace(function () {
    if (typeof window.refreshAllResultCardPreviews === 'function') {
      window.refreshAllResultCardPreviews();
    }
  });
}

function buildFontPickerDom() {
  var ul = document.getElementById('font-picker-families');
  if (!ul) return;
  ul.innerHTML = '';
  if (!window._fontCatalog || !window._fontCatalog.length) {
    var li0 = document.createElement('li');
    li0.className = 'font-picker-empty';
    li0.textContent = 'No fonts loaded. Check Google Fonts API access.';
    ul.appendChild(li0);
    return;
  }
  for (var i = 0; i < window._fontCatalog.length; i++) {
    (function (entry) {
      var li = document.createElement('li');
      li.className = 'font-picker-family-item';
      li.setAttribute('data-font-family', entry.family);
      li.setAttribute('role', 'option');
      var nameSpan = document.createElement('span');
      nameSpan.className = 'font-picker-family-name';
      nameSpan.textContent = entry.family;
      li.appendChild(nameSpan);
      var variants = entry.variants || [];
      li.addEventListener('click', function (e) {
        e.stopPropagation();
        selectFontAndVariant(entry.family, pickDefaultRegularVariant(variants), true);
      });
      ul.appendChild(li);
    })(window._fontCatalog[i]);
  }
  syncFontPickerSelectionClasses();
}

/**
 * If saved family/variant missing from catalog, reset to first entries.
 */
function reconcileFontCatalogState() {
  if (!window._fontCatalog || !window._fontCatalog.length) {
    updateFontPickerLabel();
    return;
  }
  var cat = window._fontCatalog;
  var entry = null;
  for (var i = 0; i < cat.length; i++) {
    if (cat[i].family === formatState.fontName) {
      entry = cat[i];
      break;
    }
  }
  var changed = false;
  if (!entry) {
    entry = cat[0];
    formatState.fontName = entry.family;
    formatState.fontVariant = pickDefaultRegularVariant(entry.variants || []);
    changed = true;
  } else if (entry.variants.indexOf(formatState.fontVariant) < 0) {
    formatState.fontVariant = pickDefaultRegularVariant(entry.variants || []);
    changed = true;
  }
  updateFontPickerLabel();
  syncFontPickerSelectionClasses();
  if (changed) {
    google.script.run
      .withFailureHandler(function () {})
      .saveSettings({ fontName: formatState.fontName, fontVariant: formatState.fontVariant });
  }
  refreshArabicPreviewFontFace(function () {
    if (changed && typeof window.refreshAllResultCardPreviews === 'function') {
      window.refreshAllResultCardPreviews();
    }
  });
}

function onFontCatalogLoaded(result) {
  window._fontCatalog = (result && result.catalog) ? result.catalog : [];
  if (!result || !result.ok) {
    window._fontCatalog = [];
    var err = (result && result.error) ? result.error : 'UNKNOWN';
    if (typeof console !== 'undefined' && console.warn) {
      console.warn('Font catalog:', err);
    }
  }
  buildFontPickerDom();
  reconcileFontCatalogState();
}

function debouncedSave() {
  if (saveDebounceTimer) clearTimeout(saveDebounceTimer);
  saveDebounceTimer = setTimeout(function () {
    google.script.run
      .withFailureHandler(function (err) { console.error('Save settings failed:', err); })
      .saveSettings({
        fontName: formatState.fontName,
        fontVariant: formatState.fontVariant,
        fontSize: formatState.fontSize,
        bold: formatState.bold,
        textColor: formatState.textColor
      });
    saveDebounceTimer = null;
  }, SAVE_DEBOUNCE_MS);
}

var MIN_FONT_SIZE = 8;
var MAX_FONT_SIZE = 72;
var FONT_SIZE_PRESETS = [8, 10, 12, 14, 16, 18, 24, 30, 36, 48];

function updateSizeUI() {
  var sizeValue = document.getElementById('size-stepper-value');
  var btnDown = document.getElementById('btn-size-down');
  var btnUp = document.getElementById('btn-size-up');
  if (sizeValue) sizeValue.textContent = String(formatState.fontSize);
  if (btnDown) btnDown.disabled = (formatState.fontSize <= MIN_FONT_SIZE);
  if (btnUp) btnUp.disabled = (formatState.fontSize >= MAX_FONT_SIZE);
  syncFontSizePresetSelection();
}

function applyFormatStateToUI() {
  var boldBtn = document.getElementById('btn-bold');
  var colorPicker = document.getElementById('color-picker');
  var colorTrigger = document.getElementById('color-trigger');
  updateFontPickerLabel();
  syncFontPickerSelectionClasses();
  updateSizeUI();
  if (boldBtn) boldBtn.classList.toggle('active', formatState.bold);
  var tc = formatState.textColor || '#000000';
  if (typeof normalizeHex6 === 'function') {
    var norm = normalizeHex6(tc);
    if (norm) tc = norm;
  }
  if (colorPicker) colorPicker.value = tc;
  if (colorTrigger) colorTrigger.style.backgroundColor = tc;
  if (typeof syncJsColorPickerSelection === 'function') syncJsColorPickerSelection();
}

window.reconcileFontCatalogState = reconcileFontCatalogState;

function initFormatBar() {
  var btnSizeDown = document.getElementById('btn-size-down');
  var btnSizeUp = document.getElementById('btn-size-up');
  var sizeValueBtn = document.getElementById('size-stepper-value');
  var presetUl = document.getElementById('font-size-presets-dropdown');
  var boldBtn = document.getElementById('btn-bold');
  var colorTrigger = document.getElementById('color-trigger');
  var colorPicker = document.getElementById('color-picker');
  var trig = document.getElementById('font-picker-trigger');

  if (presetUl && presetUl.children.length === 0) {
    for (var pi = 0; pi < FONT_SIZE_PRESETS.length; pi++) {
      (function (sz) {
        var li = document.createElement('li');
        li.setAttribute('role', 'none');
        var b = document.createElement('button');
        b.type = 'button';
        b.className = 'font-size-preset-item';
        b.setAttribute('role', 'option');
        b.setAttribute('data-size', String(sz));
        b.textContent = String(sz);
        b.addEventListener('click', function (e) {
          e.stopPropagation();
          formatState.fontSize = sz;
          updateSizeUI();
          debouncedSave();
          closeFontSizePresetsDropdown();
          if (typeof window.refreshAllResultCardPreviews === 'function') {
            window.refreshAllResultCardPreviews();
          }
        });
        li.appendChild(b);
        presetUl.appendChild(li);
      })(FONT_SIZE_PRESETS[pi]);
    }
  }

  if (sizeValueBtn) {
    sizeValueBtn.addEventListener('click', function (e) {
      e.stopPropagation();
      toggleFontSizePresetsDropdown();
    });
  }

  if (trig) {
    trig.addEventListener('click', function (e) {
      e.stopPropagation();
      toggleFontPicker();
    });
  }
  if (btnSizeDown) {
    btnSizeDown.addEventListener('click', function () {
      closeFontSizePresetsDropdown();
      if (formatState.fontSize > MIN_FONT_SIZE) {
        formatState.fontSize--;
        updateSizeUI();
        debouncedSave();
        if (typeof window.refreshAllResultCardPreviews === 'function') {
          window.refreshAllResultCardPreviews();
        }
      }
    });
  }
  if (btnSizeUp) {
    btnSizeUp.addEventListener('click', function () {
      closeFontSizePresetsDropdown();
      if (formatState.fontSize < MAX_FONT_SIZE) {
        formatState.fontSize++;
        updateSizeUI();
        debouncedSave();
        if (typeof window.refreshAllResultCardPreviews === 'function') {
          window.refreshAllResultCardPreviews();
        }
      }
    });
  }
  if (boldBtn) {
    boldBtn.addEventListener('click', function () {
      formatState.bold = !formatState.bold;
      boldBtn.classList.toggle('active', formatState.bold);
      debouncedSave();
      if (typeof window.refreshAllResultCardPreviews === 'function') {
        window.refreshAllResultCardPreviews();
      }
    });
  }
  function onFormatBarColorChosen(hex) {
    formatState.textColor = hex;
    if (colorTrigger) colorTrigger.style.backgroundColor = hex;
    debouncedSave();
    if (typeof window.refreshAllResultCardPreviews === 'function') {
      window.refreshAllResultCardPreviews();
    }
  }
  if (typeof initJsColorPicker === 'function') {
    initJsColorPicker(onFormatBarColorChosen, function () {
      closeFontPicker();
      closeFontSizePresetsDropdown();
    });
  }
}
</script>
