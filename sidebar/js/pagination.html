<script>
// ─── Shared Pagination Module ─────────────────────────────────────────────────
// Extracted from sidebar-js.html to keep file size manageable.
// PAGE_SIZE lives here so this module is self-contained.
// pagRenderPage reads font via window.getFormatState(), exported by sidebar-js.

var PAGE_SIZE = 10;

var _pagState = {};

/**
 * Initialize or reset pagination state for a tab with a new results array.
 * @param {string} tabId
 * @param {Array<Object>} results
 */
function pagReset(tabId, results) {
  _pagState[tabId] = { results: results || [], page: 0 };
}

function pagAppendShowMoreButton(tabId, containerEl, emptyEl, emptyMsg, remaining) {
  var showMore = document.createElement('button');
  showMore.type = 'button';
  showMore.className = 'btn-show-more';
  showMore.textContent = 'Show more (' + remaining + ' remaining)';
  (function(tid, cEl, eEl, msg) {
    showMore.addEventListener('click', function() {
      pagRenderPage(tid, cEl, eEl, msg);
    });
  }(tabId, containerEl, emptyEl, emptyMsg));
  containerEl.appendChild(showMore);
}

/**
 * Render the next page of results for a tab.
 * Clears the container on page 0. Appends a "Show more" button if more results remain.
 * Tab switching does NOT reset state; only pagClear or pagReset do.
 * @param {string} tabId
 * @param {Element} containerEl
 * @param {Element} emptyEl
 * @param {string} emptyMsg - Message shown when results array is empty
 */
function pagRenderPage(tabId, containerEl, emptyEl, emptyMsg) {
  var state = _pagState[tabId];
  if (!state) { state = { results: [], page: 0 }; _pagState[tabId] = state; }

  if (state.page === 0) {
    containerEl.innerHTML = '';
  }

  if (state.results.length === 0 && state.page === 0) {
    emptyEl.textContent = emptyMsg;
    emptyEl.classList.remove('hidden');
    return;
  }
  emptyEl.classList.add('hidden');

  var oldBtn = containerEl.querySelector('.btn-show-more');
  if (oldBtn) oldBtn.remove();

  var start = state.page * PAGE_SIZE;
  var end = Math.min(start + PAGE_SIZE, state.results.length);
  var fs = window.getFormatState
    ? window.getFormatState()
    : { fontName: 'Amiri', fontVariant: 'regular' };

  for (var i = start; i < end; i++) {
    var card = document.createElement('div');
    card.className = 'result-card';
    card.innerHTML = buildCardHtml(state.results[i], fs);
    containerEl.appendChild(card);
  }

  state.page++;

  if (end < state.results.length) {
    pagAppendShowMoreButton(tabId, containerEl, emptyEl, emptyMsg, state.results.length - end);
  }
  if (typeof scheduleSettleArabicPreviewFonts === 'function') {
    scheduleSettleArabicPreviewFonts();
  }
}

/**
 * Re-render all cards currently visible (after format bar changes), preserving pagination depth.
 * @param {string} tabId
 * @param {Element} containerEl
 * @param {Element} emptyEl
 * @param {string} emptyMsg
 */
function pagRebuildVisibleCards(tabId, containerEl, emptyEl, emptyMsg) {
  var state = _pagState[tabId];
  if (!state || !state.results.length || state.page < 1) return;

  var n = Math.min(state.page * PAGE_SIZE, state.results.length);
  if (n <= 0) return;

  containerEl.innerHTML = '';
  emptyEl.classList.add('hidden');

  var fs = window.getFormatState
    ? window.getFormatState()
    : { fontName: 'Amiri', fontVariant: 'regular' };

  for (var i = 0; i < n; i++) {
    var card = document.createElement('div');
    card.className = 'result-card';
    card.innerHTML = buildCardHtml(state.results[i], fs);
    containerEl.appendChild(card);
  }

  if (n < state.results.length) {
    pagAppendShowMoreButton(tabId, containerEl, emptyEl, emptyMsg, state.results.length - n);
  }
  if (typeof scheduleSettleArabicPreviewFonts === 'function') {
    scheduleSettleArabicPreviewFonts();
  }
}

/**
 * Refresh Arabic preview on all tabs after format bar or settings change.
 */
window.refreshAllResultCardPreviews = function () {
  if (typeof window._refreshDirectInsert === 'function') {
    window._refreshDirectInsert();
  }
  var exactR = document.getElementById('exact-search-results');
  var exactE = document.getElementById('exact-search-empty');
  if (exactR && exactE) {
    pagRebuildVisibleCards('exact-search', exactR, exactE, 'No exact matches found.');
  }
  var aiR = document.getElementById('ai-search-results');
  var aiE = document.getElementById('ai-search-empty');
  if (aiR && aiE) {
    pagRebuildVisibleCards('ai-search', aiR, aiE, 'No exact matches found for that text.');
  }
};

/**
 * Clear pagination state for a tab. Called on new search or explicit clear actions.
 * @param {string} tabId
 */
function pagClear(tabId) {
  _pagState[tabId] = { results: [], page: 0 };
}
</script>
