<script>
// Depends on globals: _settings, formatState (shared-state.html)

var settingsPanelLoadGen = 0;

function setSettingsPanelLoading(isLoading) {
  var loading = document.getElementById('settings-panel-loading');
  var body = document.getElementById('settings-panel-body');
  if (loading) {
    loading.classList.toggle('hidden', !isLoading);
    loading.setAttribute('aria-busy', isLoading ? 'true' : 'false');
  }
  if (body) body.classList.toggle('hidden', isLoading);
}

function applyTranslationCheckboxFromPayload(s) {
  var trans = document.getElementById('insert-translation');
  if (!trans) return;
  var showTrans = true;
  if (s && typeof s.showTranslation !== 'undefined') {
    showTrans = s.showTranslation !== false;
  } else if (typeof _settings !== 'undefined' && _settings && typeof _settings.showTranslation !== 'undefined') {
    showTrans = _settings.showTranslation !== false;
  }
  trans.checked = showTrans;
}

function applyBlockquoteCheckboxFromPayload(s) {
  var bq = document.getElementById('insert-blockquote');
  if (!bq) return;
  var on = true;
  if (s && typeof s.blockquoteInsertion !== 'undefined') {
    on = s.blockquoteInsertion !== false;
  } else if (typeof _settings !== 'undefined' && _settings && typeof _settings.blockquoteInsertion !== 'undefined') {
    on = _settings.blockquoteInsertion !== false;
  }
  bq.checked = on;
}

// ─── Settings Page (replaces overlay) ──────────────────────────────────────

function showSettingsPage() {
  var ids = ['sidebar-tab-nav', 'sidebar-tab-content', 'bottom-bar'];
  for (var i = 0; i < ids.length; i++) {
    var el = document.getElementById(ids[i]);
    if (el) el.classList.add('hidden');
  }
  var page = document.getElementById('settings-page');
  if (page) page.classList.remove('hidden');

  var gen = ++settingsPanelLoadGen;
  setSettingsPanelLoading(true);
  loadSettingsIntoPanel(gen);
}

function hideSettingsPage() {
  settingsPanelLoadGen++;
  var page = document.getElementById('settings-page');
  if (page) page.classList.add('hidden');
  var ids = ['sidebar-tab-nav', 'sidebar-tab-content', 'bottom-bar'];
  for (var i = 0; i < ids.length; i++) {
    var el = document.getElementById(ids[i]);
    if (el) el.classList.remove('hidden');
  }
  refreshSettings();
}

// ─── Bottom bar (feedback link, settings gear) ────────────────────────────

function initBottomMenu() {
  var btnSettings = document.getElementById('btn-bottom-settings');
  var btnBottomFeedback = document.getElementById('btn-bottom-feedback');

  function openFeedbackForm() {
    var u = typeof window._feedbackFormUrl === 'string' ? window._feedbackFormUrl : '';
    if (u) {
      window.open(u, '_blank', 'noopener,noreferrer');
    } else if (typeof console !== 'undefined' && console.warn) {
      console.warn('feedback_form_url script property is not set');
    }
  }

  if (btnSettings) {
    btnSettings.addEventListener('click', function () {
      showSettingsPage();
    });
  }

  if (btnBottomFeedback) {
    btnBottomFeedback.addEventListener('click', openFeedbackForm);
  }
}

// ─── Init ──────────────────────────────────────────────────────────────────

function initSettings() {
  var btnBack = document.getElementById('btn-settings-back');

  if (btnBack) {
    btnBack.addEventListener('click', function () {
      hideSettingsPage();
    });
  }

  initBottomMenu();
}

function refreshSettings() {
  google.script.run.withSuccessHandler(function (s) {
    _settings = s;
  }).getSettings();
}

function loadSettingsIntoPanel(gen) {
  google.script.run
    .withSuccessHandler(function (s) {
      if (gen !== settingsPanelLoadGen) return;
      applyTranslationCheckboxFromPayload(s);
      applyBlockquoteCheckboxFromPayload(s);
      setSettingsPanelLoading(false);
    })
    .withFailureHandler(function () {
      if (gen !== settingsPanelLoadGen) return;
      applyTranslationCheckboxFromPayload(null);
      applyBlockquoteCheckboxFromPayload(null);
      setSettingsPanelLoading(false);
    })
    .getSettings();
}

function initSettingsPanelHandlers() {
  var trans = document.getElementById('insert-translation');
  var bq = document.getElementById('insert-blockquote');

  // Auto-save on toggle change
  if (trans) {
    trans.addEventListener('change', function () {
      var showTranslation = trans.checked;
      if (typeof _settings !== 'object' || !_settings) {
        _settings = {};
      }
      _settings.showTranslation = showTranslation;
      google.script.run
        .withFailureHandler(function () {
          // Revert on failure
          _settings.showTranslation = !showTranslation;
          trans.checked = !showTranslation;
        })
        .saveSettings({ showTranslation: showTranslation });
    });
  }

  if (bq) {
    bq.addEventListener('change', function () {
      var blockquoteInsertion = bq.checked;
      if (typeof _settings !== 'object' || !_settings) {
        _settings = {};
      }
      _settings.blockquoteInsertion = blockquoteInsertion;
      google.script.run
        .withFailureHandler(function () {
          _settings.blockquoteInsertion = !blockquoteInsertion;
          bq.checked = !blockquoteInsertion;
        })
        .saveSettings({ blockquoteInsertion: blockquoteInsertion });
    });
  }
}

function onSettingsLoaded(settings) {
  _settings = settings;
  if (typeof window.refreshAllResultCardPreviews === 'function') {
    window.refreshAllResultCardPreviews();
  }
}
</script>
