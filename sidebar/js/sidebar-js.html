<script>
(function() {
  'use strict';

  window._refreshDirectInsert = null;  // set by initDirectInsertTab, read by format-bar.html

  // ─── Tab Navigation ──────────────────────────────────────────────────────────

  window._activeTab = 'direct-insert';

  function initTabNav() {
    var tabBtns = document.querySelectorAll('.tab-btn');
    tabBtns.forEach(function(btn) {
      btn.addEventListener('click', function() {
        switchTab(btn.getAttribute('data-tab'));
      });
    });
    switchTab('direct-insert');
  }

  function switchTab(tabId) {
    window._activeTab = tabId;

    var tabBtns = document.querySelectorAll('.tab-btn');
    tabBtns.forEach(function(btn) {
      btn.classList.toggle('active', btn.getAttribute('data-tab') === tabId);
    });

    var panels = document.querySelectorAll('.tab-panel');
    panels.forEach(function(panel) {
      panel.classList.toggle('active', panel.id === 'panel-' + tabId);
    });

    if (tabId === 'direct-insert') {
      ensureUthmaniCache();      // no-op if already loading or loaded
      ensureTranslationCache();  // fires in parallel with uthmani fetch
    }
    if (tabId === 'exact-search') {
      ensureImlaeiCache();       // no-op if already loading or loaded
    }
  }

  function setupTextarea(el, onSubmit) {
    if (!el) return;
    el.addEventListener('input', function() {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    });
    el.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        onSubmit();
      }
    });
  }
  window.setupTextarea = setupTextarea;

  // ─── Init ────────────────────────────────────────────────────────────────────

  function init() {
    var pendingInit = 6;
    function onInitDone() {
      if (--pendingInit <= 0) {
        var overlay = document.getElementById('startup-overlay');
        if (overlay) overlay.classList.add('hidden');
      }
    }

    google.script.run
      .withSuccessHandler(function(s) { onSettingsLoaded(s); onInitDone(); })
      .withFailureHandler(function() { applyFormatStateToUI(); onInitDone(); })
      .getSettings();

    google.script.run
      .withSuccessHandler(function(res) { onFontCatalogLoaded(res); onInitDone(); })
      .withFailureHandler(function() { onFontCatalogLoaded({ ok: false, error: 'RPC_FAIL', catalog: [] }); onInitDone(); })
      .getCuratedFontCatalog();

    ensureUthmaniCache(onInitDone, onInitDone);
    ensureTranslationCache(onInitDone, onInitDone);
    ensureImlaeiCache(onInitDone, onInitDone);
    ensureSurahMetaCache(onInitDone, onInitDone);

    initFormatBar();
    initSettings();
    initSettingsPanelHandlers();
    initTabNav();
    initDirectInsertTab();
    initExactSearchTab();
    initAISearchTab();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

})();
</script>
