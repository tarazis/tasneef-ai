<script>
(function() {
  'use strict';

  window._refreshDirectInsert = null;  // set by initDirectInsertTab; invoked by refreshAllResultCardPreviews (pagination.html)

  // ─── Tab Navigation ──────────────────────────────────────────────────────────

  window._activeTab = 'direct-insert';

  function initTabNav() {
    var tabBtns = document.querySelectorAll('.tab-btn');
    tabBtns.forEach(function(btn) {
      btn.addEventListener('click', function() {
        switchTab(btn.getAttribute('data-tab'));
      });
    });
    switchTab('direct-insert');
  }

  function switchTab(tabId) {
    window._activeTab = tabId;

    var tabBtns = document.querySelectorAll('.tab-btn');
    tabBtns.forEach(function(btn) {
      btn.classList.toggle('active', btn.getAttribute('data-tab') === tabId);
    });

    var panels = document.querySelectorAll('.tab-panel');
    panels.forEach(function(panel) {
      panel.classList.toggle('active', panel.id === 'panel-' + tabId);
    });

    if (tabId === 'direct-insert') {
      ensureUthmaniCache();      // no-op if already loading or loaded
      ensureTranslationCache();  // fires in parallel with uthmani fetch
    }
    if (tabId === 'exact-search') {
      ensureImlaeiCache();       // no-op if already loading or loaded
    }

    // Show/hide new-chat button based on active tab + conversation state
    if (typeof updateNewChatVisibility === 'function') {
      updateNewChatVisibility();
    }
  }

  function setupTextarea(el, onSubmit) {
    if (!el) return;
    el.addEventListener('input', function() {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    });
    el.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        onSubmit();
      }
    });
  }
  window.setupTextarea = setupTextarea;

  // ─── Init ────────────────────────────────────────────────────────────────────

  function init() {
    window._feedbackFormUrl = '';
    var pendingInit = 7;
    function onInitDone() {
      if (--pendingInit <= 0) {
        var overlay = document.getElementById('startup-overlay');
        if (overlay) overlay.classList.add('hidden');
      }
    }

    google.script.run
      .withSuccessHandler(function(s) { onSettingsLoaded(s); onInitDone(); })
      .withFailureHandler(function() {
        if (typeof window.refreshAllResultCardPreviews === 'function') {
          window.refreshAllResultCardPreviews();
        }
        onInitDone();
      })
      .getSettings();

    google.script.run
      .withSuccessHandler(function (url) {
        window._feedbackFormUrl = url ? String(url) : '';
        onInitDone();
      })
      .withFailureHandler(function () {
        window._feedbackFormUrl = '';
        onInitDone();
      })
      .getFeedbackFormUrl();

    if (typeof ensureGoogleFontsPreviewStylesheet === 'function') {
      ensureGoogleFontsPreviewStylesheet('Amiri', ['regular'], onInitDone);
    } else {
      onInitDone();
    }

    ensureUthmaniCache(onInitDone, onInitDone);
    ensureTranslationCache(onInitDone, onInitDone);
    ensureImlaeiCache(onInitDone, onInitDone);
    ensureSurahMetaCache(onInitDone, onInitDone);

    initSettings();
    initSettingsPanelHandlers();
    initTabNav();
    initDirectInsertTab();
    initExactSearchTab();
    initAISearchTab();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

})();
</script>
