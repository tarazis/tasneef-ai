<script>
/**
 * Docs-style swatch palette + custom color dialog for the format bar.
 * Pure helpers duplicated in tests/jsColorPicker.test.js (Node).
 */

function normalizeHex6(value) {
  if (value == null || typeof value !== 'string') return null;
  var s = value.trim();
  if (s.charAt(0) === '#') s = s.slice(1);
  if (s.length === 3) {
    s = s.charAt(0) + s.charAt(0) + s.charAt(1) + s.charAt(1) + s.charAt(2) + s.charAt(2);
  }
  if (!/^[0-9a-fA-F]{6}$/.test(s)) return null;
  return '#' + s.toUpperCase();
}

function hexToRgb(hex) {
  var n = normalizeHex6(hex);
  if (!n) return null;
  return {
    r: parseInt(n.slice(1, 3), 16),
    g: parseInt(n.slice(3, 5), 16),
    b: parseInt(n.slice(5, 7), 16)
  };
}

function rgbToHex(r, g, b) {
  function h2(x) {
    var v = Math.max(0, Math.min(255, Math.round(x)));
    var s = v.toString(16);
    return s.length === 1 ? '0' + s : s;
  }
  return ('#' + h2(r) + h2(g) + h2(b)).toUpperCase();
}

function rgbToHsv(r, g, b) {
  r /= 255;
  g /= 255;
  b /= 255;
  var max = Math.max(r, g, b);
  var min = Math.min(r, g, b);
  var d = max - min;
  var h = 0;
  if (d !== 0) {
    if (max === r) h = ((g - b) / d + (g < b ? 6 : 0)) / 6;
    else if (max === g) h = ((b - r) / d + 2) / 6;
    else h = ((r - g) / d + 4) / 6;
  }
  h *= 360;
  var s = max === 0 ? 0 : d / max;
  var v = max;
  return { h: h, s: s, v: v };
}

function hsvToRgb(h, s, v) {
  h = ((h % 360) + 360) % 360;
  var c = v * s;
  var x = c * (1 - Math.abs(((h / 60) % 2) - 1));
  var m = v - c;
  var rp;
  var gp;
  var bp;
  if (h < 60) {
    rp = c;
    gp = x;
    bp = 0;
  } else if (h < 120) {
    rp = x;
    gp = c;
    bp = 0;
  } else if (h < 180) {
    rp = 0;
    gp = c;
    bp = x;
  } else if (h < 240) {
    rp = 0;
    gp = x;
    bp = c;
  } else if (h < 300) {
    rp = x;
    gp = 0;
    bp = c;
  } else {
    rp = c;
    gp = 0;
    bp = x;
  }
  return {
    r: Math.round((rp + m) * 255),
    g: Math.round((gp + m) * 255),
    b: Math.round((bp + m) * 255)
  };
}

/**
 * Fixed 8×7 preset palette (row-major). Duplicated in tests/jsColorPicker.test.js.
 * @type {string[]}
 */
var PRESET_SWATCH_HEXES_RAW = [
  '#EE7EA0', '#FFA9BA', '#FFD7D6', '#FF9797', '#EA7D70', '#F65353', '#D20000',
  '#FD5E00', '#F58553', '#FFA07A', '#FBBF9B', '#FFAF6E', '#F59A23', '#FCB55C',
  '#FFCC80', '#FFD6A2', '#EEB649', '#CE8540', '#FEF7B5', '#F6DE6C', '#F7CE15',
  '#BCC07B', '#DBE098', '#C1DB9E', '#91CA57', '#669E63', '#007355', '#007D75',
  '#75B39C', '#ADD2CA', '#D5E2D3', '#7CCED2', '#D5EDF8', '#ABCDDE', '#65C0E6',
  '#1EB0E6', '#03468F', '#7D8BE0', '#B5BEF5', '#CDBDEB', '#E1CEE5', '#EFD5FF',
  '#F6E7FF', '#9A81B0', '#7851A5', '#E6B1D3', '#B19F9A', '#E1CFCA', '#F1ECEA',
  '#E5DACA', '#C9A98D', '#8E715B', '#4F3F3E', '#D2D2D2', '#AAAAAA', '#363636'
];

/**
 * @return {string[]}
 */
function buildPresetSwatchHexes() {
  var out = [];
  for (var i = 0; i < PRESET_SWATCH_HEXES_RAW.length; i++) {
    out.push(normalizeHex6(PRESET_SWATCH_HEXES_RAW[i]));
  }
  return out;
}

function swatchNeedsLightOutline(hex) {
  var rgb = hexToRgb(hex);
  if (!rgb) return false;
  var L = (0.299 * rgb.r + 0.587 * rgb.g + 0.114 * rgb.b) / 255;
  return L > 0.9;
}

var _jsColorPickerDocHandler = null;
var _jsColorPickerInitialized = false;
var _colorPickerOnColorChosen = null;

var _customH = 0;
var _customS = 1;
var _customV = 1;
var _customInputsSilent = false;
var _customMoveHandler = null;
var _customUpHandler = null;

function closeJsColorPickerPopover() {
  var pop = document.getElementById('color-picker-popover');
  var trig = document.getElementById('color-trigger');
  if (pop) {
    pop.classList.add('hidden');
    pop.setAttribute('aria-hidden', 'true');
  }
  if (trig) trig.setAttribute('aria-expanded', 'false');
  if (_jsColorPickerDocHandler) {
    document.removeEventListener('click', _jsColorPickerDocHandler, true);
    _jsColorPickerDocHandler = null;
  }
}

function onJsColorPickerDocClick(e) {
  var wrap = document.querySelector('.format-bar .color-wrap');
  if (wrap && !wrap.contains(e.target)) closeJsColorPickerPopover();
}

function openJsColorPickerPopover(closeFontPickerFn) {
  var pop = document.getElementById('color-picker-popover');
  var trig = document.getElementById('color-trigger');
  if (!pop || !trig) return;
  if (typeof closeFontPickerFn === 'function') closeFontPickerFn();
  pop.classList.remove('hidden');
  pop.setAttribute('aria-hidden', 'false');
  trig.setAttribute('aria-expanded', 'true');
  syncJsColorPickerSelection();
  setTimeout(function () {
    _jsColorPickerDocHandler = onJsColorPickerDocClick;
    document.addEventListener('click', _jsColorPickerDocHandler, true);
  }, 0);
}

function toggleJsColorPickerPopover(closeFontPickerFn) {
  var pop = document.getElementById('color-picker-popover');
  if (!pop) return;
  if (pop.classList.contains('hidden')) openJsColorPickerPopover(closeFontPickerFn);
  else closeJsColorPickerPopover();
}

function syncJsColorPickerSelection() {
  var pop = document.getElementById('color-picker-popover');
  if (!pop) return;
  var current = typeof formatState !== 'undefined' && formatState.textColor
    ? normalizeHex6(formatState.textColor)
    : null;
  var buttons = pop.querySelectorAll('.color-swatch');
  for (var i = 0; i < buttons.length; i++) {
    var btn = buttons[i];
    var h = btn.getAttribute('data-hex');
    var norm = normalizeHex6(h);
    btn.classList.toggle('is-selected', current != null && norm === current);
  }
}

function addCustomSwatchColor(hex) {
  var h = normalizeHex6(hex);
  if (!h || typeof formatState === 'undefined') return;
  var list = formatState.customSwatchColors && formatState.customSwatchColors.length
    ? formatState.customSwatchColors.slice()
    : [];
  list = list.filter(function (x) {
    return normalizeHex6(x) !== h;
  });
  list.push(h);
  while (list.length > 5) list.shift();
  formatState.customSwatchColors = list;
  google.script.run
    .withFailureHandler(function () {})
    .saveSettings({ customSwatchColors: list });
  renderCustomSwatchRow();
  syncJsColorPickerSelection();
}

function clearCustomSwatchColors() {
  if (typeof formatState === 'undefined') return;
  formatState.customSwatchColors = [];
  google.script.run
    .withFailureHandler(function () {})
    .saveSettings({ customSwatchColors: [] });
  renderCustomSwatchRow();
  syncJsColorPickerSelection();
}

function renderCustomSwatchRow() {
  var host = document.getElementById('color-custom-swatches');
  var rowWrap = document.getElementById('color-custom-row');
  var nativeInput = document.getElementById('color-picker');
  if (!host || !rowWrap) return;
  var list = (typeof formatState !== 'undefined' && formatState.customSwatchColors)
    ? formatState.customSwatchColors
    : [];
  host.innerHTML = '';
  var i;
  for (i = 0; i < list.length; i++) {
    var hex = normalizeHex6(list[i]);
    if (!hex) continue;
    (function (savedHex) {
      var b = document.createElement('button');
      b.type = 'button';
      b.className = 'color-swatch';
      b.setAttribute('data-hex', savedHex);
      b.style.backgroundColor = savedHex;
      if (swatchNeedsLightOutline(savedHex)) b.classList.add('color-swatch--outline');
      b.setAttribute('aria-label', 'Saved custom color');
      b.addEventListener('click', function (ev) {
        ev.stopPropagation();
        if (nativeInput) nativeInput.value = savedHex;
        if (typeof _colorPickerOnColorChosen === 'function') _colorPickerOnColorChosen(savedHex);
        closeJsColorPickerPopover();
      });
      host.appendChild(b);
    })(hex);
  }
  rowWrap.classList.toggle('hidden', list.length === 0);
}

function closeCustomColorDialog() {
  var dlg = document.getElementById('custom-color-dialog');
  if (dlg) {
    dlg.classList.add('hidden');
    dlg.setAttribute('aria-hidden', 'true');
  }
  detachCustomColorDrag();
}

function detachCustomColorDrag() {
  if (_customMoveHandler) {
    window.removeEventListener('mousemove', _customMoveHandler);
    window.removeEventListener('mouseup', _customUpHandler);
    window.removeEventListener('touchmove', _customMoveHandler);
    window.removeEventListener('touchend', _customUpHandler);
    window.removeEventListener('touchcancel', _customUpHandler);
    _customMoveHandler = null;
    _customUpHandler = null;
  }
}

function applyCustomHueVar() {
  var sv = document.getElementById('custom-color-sv');
  var thumb = document.getElementById('custom-color-hue-thumb');
  var hStr = String(Math.round(_customH));
  if (sv) sv.style.setProperty('--custom-hue', hStr);
  if (thumb) thumb.style.setProperty('--custom-hue', hStr);
}

function refreshCustomColorUI() {
  applyCustomHueVar();
  var rgb = hsvToRgb(_customH, _customS, _customV);
  var hex = rgbToHex(rgb.r, rgb.g, rgb.b);
  var preview = document.getElementById('custom-color-preview');
  if (preview) preview.style.backgroundColor = hex;
  var handle = document.getElementById('custom-color-sv-handle');
  if (handle) {
    handle.style.left = _customS * 100 + '%';
    handle.style.top = (1 - _customV) * 100 + '%';
  }
  var hueThumb = document.getElementById('custom-color-hue-thumb');
  if (hueThumb) hueThumb.style.left = (_customH / 360) * 100 + '%';
  var track = document.getElementById('custom-color-hue-track');
  if (track) track.setAttribute('aria-valuenow', String(Math.round(_customH)));
  _customInputsSilent = true;
  var hexIn = document.getElementById('custom-color-hex');
  var rIn = document.getElementById('custom-color-r');
  var gIn = document.getElementById('custom-color-g');
  var bIn = document.getElementById('custom-color-b');
  if (hexIn) hexIn.value = hex;
  if (rIn) rIn.value = String(rgb.r);
  if (gIn) gIn.value = String(rgb.g);
  if (bIn) bIn.value = String(rgb.b);
  _customInputsSilent = false;
}

function setCustomColorFromHexInput() {
  var hexIn = document.getElementById('custom-color-hex');
  if (!hexIn || _customInputsSilent) return;
  var raw = hexIn.value.trim();
  if (raw.charAt(0) !== '#') raw = '#' + raw;
  var n = normalizeHex6(raw);
  if (!n) return;
  var rgb = hexToRgb(n);
  if (!rgb) return;
  var hsv = rgbToHsv(rgb.r, rgb.g, rgb.b);
  _customH = hsv.h;
  _customS = hsv.s;
  _customV = hsv.v;
  refreshCustomColorUI();
}

function setCustomColorFromRgbInputs() {
  if (_customInputsSilent) return;
  var rIn = document.getElementById('custom-color-r');
  var gIn = document.getElementById('custom-color-g');
  var bIn = document.getElementById('custom-color-b');
  if (!rIn || !gIn || !bIn) return;
  var r = parseInt(rIn.value, 10);
  var g = parseInt(gIn.value, 10);
  var b = parseInt(bIn.value, 10);
  if (isNaN(r) || isNaN(g) || isNaN(b)) return;
  r = Math.max(0, Math.min(255, r));
  g = Math.max(0, Math.min(255, g));
  b = Math.max(0, Math.min(255, b));
  var hsv = rgbToHsv(r, g, b);
  _customH = hsv.h;
  _customS = hsv.s;
  _customV = hsv.v;
  refreshCustomColorUI();
}

function openCustomColorDialog() {
  var dlg = document.getElementById('custom-color-dialog');
  if (!dlg) return;
  closeJsColorPickerPopover();
  var startHex = '#000000';
  if (typeof formatState !== 'undefined' && formatState.textColor) {
    var n = normalizeHex6(formatState.textColor);
    if (n) startHex = n;
  }
  var rgb = hexToRgb(startHex);
  if (!rgb) rgb = { r: 0, g: 0, b: 0 };
  var hsv = rgbToHsv(rgb.r, rgb.g, rgb.b);
  _customH = hsv.h;
  _customS = hsv.s;
  _customV = hsv.v;
  refreshCustomColorUI();
  dlg.classList.remove('hidden');
  dlg.setAttribute('aria-hidden', 'false');
}

function bindCustomColorPointer(svEl, hueTrack) {
  function clientFromEvent(e) {
    return e.touches && e.touches[0] ? e.touches[0] : e;
  }

  function onSvMove(clientX, clientY) {
    var rect = svEl.getBoundingClientRect();
    var x = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    var y = Math.max(0, Math.min(1, (clientY - rect.top) / rect.height));
    _customS = x;
    _customV = 1 - y;
    refreshCustomColorUI();
  }

  function onHueMove(clientX, clientY) {
    var rect = hueTrack.getBoundingClientRect();
    var x = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    _customH = x * 360;
    refreshCustomColorUI();
  }

  function startSv(e) {
    e.preventDefault();
    detachCustomColorDrag();
    var c = clientFromEvent(e);
    onSvMove(c.clientX, c.clientY);
    _customMoveHandler = function (ev) {
      var cl = clientFromEvent(ev);
      if (cl) onSvMove(cl.clientX, cl.clientY);
    };
    _customUpHandler = function () {
      detachCustomColorDrag();
    };
    window.addEventListener('mousemove', _customMoveHandler);
    window.addEventListener('mouseup', _customUpHandler);
    window.addEventListener('touchmove', _customMoveHandler, { passive: false });
    window.addEventListener('touchend', _customUpHandler);
    window.addEventListener('touchcancel', _customUpHandler);
  }

  function startHue(e) {
    e.preventDefault();
    detachCustomColorDrag();
    var c = clientFromEvent(e);
    onHueMove(c.clientX, c.clientY);
    _customMoveHandler = function (ev) {
      var cl = clientFromEvent(ev);
      if (cl) onHueMove(cl.clientX, cl.clientY);
    };
    _customUpHandler = function () {
      detachCustomColorDrag();
    };
    window.addEventListener('mousemove', _customMoveHandler);
    window.addEventListener('mouseup', _customUpHandler);
    window.addEventListener('touchmove', _customMoveHandler, { passive: false });
    window.addEventListener('touchend', _customUpHandler);
    window.addEventListener('touchcancel', _customUpHandler);
  }

  svEl.addEventListener('mousedown', startSv);
  svEl.addEventListener('touchstart', startSv, { passive: false });
  hueTrack.addEventListener('mousedown', startHue);
  hueTrack.addEventListener('touchstart', startHue, { passive: false });
}

/**
 * @param {function(string): void} onColorChosen
 * @param {function(): void} [closeFontPicker]
 */
function initJsColorPicker(onColorChosen, closeFontPicker) {
  if (_jsColorPickerInitialized) return;
  _jsColorPickerInitialized = true;
  _colorPickerOnColorChosen = onColorChosen;

  var grid = document.getElementById('color-swatch-grid');
  var colorTrigger = document.getElementById('color-trigger');
  var nativeInput = document.getElementById('color-picker');
  var btnCustom = document.getElementById('btn-color-custom');
  var btnClearCustom = document.getElementById('btn-clear-custom-swatches');
  var customDlg = document.getElementById('custom-color-dialog');
  var customPanel = customDlg ? customDlg.querySelector('.custom-color-dialog-panel') : null;
  var svEl = document.getElementById('custom-color-sv');
  var hueTrack = document.getElementById('custom-color-hue-track');
  var btnOk = document.getElementById('btn-custom-ok');
  var btnCancel = document.getElementById('btn-custom-cancel');
  var hexIn = document.getElementById('custom-color-hex');
  var rIn = document.getElementById('custom-color-r');
  var gIn = document.getElementById('custom-color-g');
  var bIn = document.getElementById('custom-color-b');
  var btnEye = document.getElementById('btn-custom-eyedropper');

  if (!grid || !colorTrigger || !nativeInput) return;

  var hexes = buildPresetSwatchHexes();
  grid.innerHTML = '';
  var row;
  var col;
  var idx;
  var cols = 7;
  for (idx = 0; idx < hexes.length; idx++) {
    row = Math.floor(idx / cols) + 1;
    col = (idx % cols) + 1;
    var hex = hexes[idx];
    var b = document.createElement('button');
    b.type = 'button';
    b.className = 'color-swatch';
    b.setAttribute('data-hex', hex);
    b.style.backgroundColor = hex;
    if (swatchNeedsLightOutline(hex)) b.classList.add('color-swatch--outline');
    b.setAttribute('aria-label', 'Swatch row ' + row + ', column ' + col);
    b.addEventListener('click', function (ev) {
      ev.stopPropagation();
      var h = normalizeHex6(ev.currentTarget.getAttribute('data-hex'));
      if (!h) return;
      if (typeof onColorChosen === 'function') onColorChosen(h);
      nativeInput.value = h;
      closeJsColorPickerPopover();
    });
    grid.appendChild(b);
  }

  colorTrigger.addEventListener('click', function (e) {
    e.stopPropagation();
    toggleJsColorPickerPopover(closeFontPicker);
  });

  if (btnCustom) {
    btnCustom.addEventListener('click', function (e) {
      e.stopPropagation();
      openCustomColorDialog();
    });
  }

  if (customDlg && customPanel) {
    customDlg.addEventListener('click', function (e) {
      if (e.target === customDlg) closeCustomColorDialog();
    });
    customPanel.addEventListener('click', function (e) {
      e.stopPropagation();
    });
  }

  if (svEl && hueTrack) {
    bindCustomColorPointer(svEl, hueTrack);
  }

  if (btnOk) {
    btnOk.addEventListener('click', function (e) {
      e.stopPropagation();
      var rgb = hsvToRgb(_customH, _customS, _customV);
      var h = rgbToHex(rgb.r, rgb.g, rgb.b);
      nativeInput.value = h;
      if (typeof onColorChosen === 'function') onColorChosen(h);
      addCustomSwatchColor(h);
      closeCustomColorDialog();
    });
  }

  if (btnClearCustom) {
    btnClearCustom.addEventListener('click', function (e) {
      e.stopPropagation();
      clearCustomSwatchColors();
    });
  }

  renderCustomSwatchRow();
  if (btnCancel) {
    btnCancel.addEventListener('click', function (e) {
      e.stopPropagation();
      closeCustomColorDialog();
    });
  }

  if (hexIn) {
    hexIn.addEventListener('input', function () {
      if (!_customInputsSilent) setCustomColorFromHexInput();
    });
    hexIn.addEventListener('change', function () {
      setCustomColorFromHexInput();
    });
  }
  function onRgbInput() {
    if (!_customInputsSilent) setCustomColorFromRgbInputs();
  }
  if (rIn) rIn.addEventListener('input', onRgbInput);
  if (gIn) gIn.addEventListener('input', onRgbInput);
  if (bIn) bIn.addEventListener('input', onRgbInput);

  if (btnEye) {
    if (typeof window.EyeDropper === 'function') {
      btnEye.style.display = '';
      btnEye.addEventListener('click', function (e) {
        e.stopPropagation();
        var ed = new window.EyeDropper();
        ed.open()
          .then(function (result) {
            var h = normalizeHex6(result.sRGBHex);
            var rgb = hexToRgb(h);
            if (!rgb) return;
            var hsv = rgbToHsv(rgb.r, rgb.g, rgb.b);
            _customH = hsv.h;
            _customS = hsv.s;
            _customV = hsv.v;
            refreshCustomColorUI();
          })
          .catch(function () {});
      });
    } else {
      btnEye.style.display = 'none';
    }
  }

  document.addEventListener('keydown', function customColorEsc(e) {
    if (e.key !== 'Escape') return;
    var dlg = document.getElementById('custom-color-dialog');
    if (!dlg || dlg.classList.contains('hidden')) return;
    closeCustomColorDialog();
  });
}

window.normalizeHex6 = normalizeHex6;
window.buildPresetSwatchHexes = buildPresetSwatchHexes;
window.renderCustomSwatchRow = renderCustomSwatchRow;
window.rgbToHsv = rgbToHsv;
window.hsvToRgb = hsvToRgb;
window.initJsColorPicker = initJsColorPicker;
window.closeJsColorPickerPopover = closeJsColorPickerPopover;
window.openJsColorPickerPopover = openJsColorPickerPopover;
window.toggleJsColorPickerPopover = toggleJsColorPickerPopover;
window.syncJsColorPickerSelection = syncJsColorPickerSelection;
window.closeCustomColorDialog = closeCustomColorDialog;
</script>
