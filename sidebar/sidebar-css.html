<style>
  * { box-sizing: border-box; }
  body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 13px; color: #333; background: #fff; }
  .sidebar { display: flex; flex-direction: column; min-height: 100vh; width: 350px; max-width: 100%; }

  .header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid #e0e0e0; flex-shrink: 0; }
  .header-brand { display: flex; align-items: center; gap: 8px; }
  .logo { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; background: #2e7d32; color: #fff; font-weight: 700; font-size: 14px; border-radius: 4px; }
  .title { font-weight: 600; font-size: 15px; color: #1a1a1a; }

  .format-bar { display: flex; align-items: center; gap: 8px; padding: 10px 16px; border-bottom: 1px solid #e0e0e0; flex-wrap: wrap; }
  .format-bar select, .format-bar input[type="number"] { padding: 6px 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 12px; min-width: 0; }
  .format-bar .font-select { flex: 1; min-width: 80px; max-width: 140px; }
  .format-bar .size-select { width: 52px; }
  .format-bar .btn-format { padding: 6px 10px; border: 1px solid #ccc; background: #fafafa; border-radius: 4px; font-size: 12px; font-weight: 700; cursor: pointer; }
  .format-bar .btn-format.active { background: #e8e8e8; border-color: #999; }
  .format-bar .color-wrap { position: relative; }
  .format-bar .color-trigger { width: 28px; height: 28px; padding: 0; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; background: #000; }
  .format-bar .color-picker-hidden { position: absolute; width: 0; height: 0; opacity: 0; pointer-events: none; }

  .tabs { display: flex; border-bottom: 1px solid #e0e0e0; padding: 0 16px; flex-shrink: 0; }
  .tab { flex: 1; padding: 10px 12px; border: none; background: none; font-size: 13px; color: #666; cursor: pointer; border-bottom: 2px solid transparent; }
  .tab:hover { color: #333; }
  .tab.active { font-weight: 600; color: #1a1a1a; border-bottom-color: #333; }

  .tab-content { flex: 1; overflow-y: auto; padding: 16px; min-height: 0; }
  .tab-pane { display: none; }
  .tab-pane.active { display: block; }

  .footer { padding: 10px 16px; border-top: 1px solid #e0e0e0; flex-shrink: 0; }
  .btn-icon { padding: 8px; border: none; background: none; cursor: pointer; color: #666; border-radius: 4px; }
  .btn-icon:hover { background: #f0f0f0; color: #333; }

  .settings-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.3); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .settings-overlay.hidden { display: none; }
  .settings-panel { background: #fff; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); max-width: 320px; width: 100%; max-height: 90vh; overflow-y: auto; padding: 20px; }
  .settings-panel h2 { margin: 0 0 16px; font-size: 18px; display: flex; align-items: center; gap: 8px; }
  .settings-panel .back-btn { padding: 4px; border: none; background: none; cursor: pointer; color: #666; }
  .settings-panel .back-btn:hover { color: #333; }
  .settings-section { margin-bottom: 20px; }
  .settings-section label { display: block; font-weight: 500; margin-bottom: 8px; font-size: 13px; }
  .settings-section .hint { font-size: 11px; color: #666; margin-top: 4px; }
  .settings-section select, .settings-section input[type="text"] { width: 100%; padding: 8px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
  .settings-section input[type="text"][data-masked] { font-family: monospace; }
  .settings-radio, .settings-check { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; cursor: pointer; }
  .settings-radio input, .settings-check input { margin: 0; }
  .settings-save-row { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
  .btn-primary { padding: 8px 16px; background: #2e7d32; color: #fff; border: none; border-radius: 4px; font-size: 13px; cursor: pointer; }
  .btn-primary:hover { background: #1b5e20; }

  .tab-browse .field-row, .tab-search .field-row { margin-bottom: 12px; }
  .tab-browse label, .tab-search label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; }
  .tab-browse select, .tab-search select, .tab-search input { width: 100%; padding: 8px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }

  .tab-search .search-input-wrap input { padding-left: 32px; }

  .tab-ai textarea { width: 100%; min-height: 80px; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; resize: vertical; }
  .tab-ai .btn-ai { margin-top: 12px; padding: 10px 16px; background: #2e7d32; color: #fff; border: none; border-radius: 4px; font-size: 13px; cursor: pointer; width: 100%; }
  .tab-ai .btn-ai:hover { background: #1b5e20; }
  .results-list { margin-top: 16px; max-height: 300px; overflow-y: auto; }

  .result-card .ref { font-weight: 600; margin-bottom: 4px; }
  .result-card .arabic { font-size: 18px; direction: rtl; text-align: right; font-family: Amiri, serif; margin: 8px 0; }
  .result-card mark { background: #fff59d; padding: 0 2px; }
  .empty-state { color: #666; font-size: 13px; padding: 24px 0; text-align: center; }
  .hidden { display: none !important; }
  .browse-preview { margin-top: 16px; padding: 12px; border: 1px solid #e0e0e0; border-radius: 4px; min-height: 60px; }
  .browse-preview .arabic { font-size: 20px; direction: rtl; text-align: right; font-family: Amiri, serif; }
  .browse-preview .translation { font-size: 12px; color: #666; margin-top: 8px; }
</style>
