<style>
  /* ─── Design Tokens ──────────────────────────────────────────────────────── */
  :root {
    /* Primary emerald */
    --color-primary: #0d6e4f;
    --color-primary-hover: #095c42;
    --color-primary-light: #ecfdf5;
    --color-primary-lighter: #f0fdf8;
    /* Accent mint */
    --color-accent: #34d399;
    --color-accent-light: #d1fae5;
    /* Neutrals */
    --color-text-primary: #1a1a2e;
    --color-text-secondary: #5c6370;
    --color-text-muted: #8b95a5;
    --color-border: #cbd5e1;
    --color-border-hover: #94a3b8;
    --color-bg: #ffffff;
    --color-bg-secondary: #f8fafc;
    --color-bg-hover: #f1f5f9;
    /* Error */
    --color-error: #c0392b;
    /* Spacing */
    --space-xs: 4px;
    --space-sm: 8px;
    --space-md: 12px;
    --space-lg: 16px;
    --space-xl: 20px;
    /* Horizontal gutter for sidebar chrome (tabs, scroll areas, settings) */
    --sidebar-inline: var(--space-md);
    /* Radii */
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
    --radius-full: 9999px;
    /* Shadows */
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
    --shadow-md: 0 2px 8px rgba(0,0,0,0.08);
    --shadow-lg: 0 4px 16px rgba(0,0,0,0.1);
    /* Transitions */
    --transition-fast: 0.15s ease;
    --transition-normal: 0.2s ease;
  }

  /* ─── Base ────────────────────────────────────────────────────────────────── */
  * { box-sizing: border-box; }
  body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 13px; color: var(--color-text-primary); background: var(--color-bg); }
  .sidebar { display: flex; flex-direction: column; height: 100vh; width: 350px; max-width: 100%; position: relative; }

  /* ─── Tab Navigation ──────────────────────────────────────────────────────── */
  .tab-nav { display: flex; border-bottom: 2px solid var(--color-border); flex-shrink: 0;}
  .tab-btn {
    flex: 1 1 0;
    min-width: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0;
    padding: var(--space-md);
    border: none;
    background: none;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    line-height: 1;
    color: var(--color-text-secondary);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    transition: color var(--transition-fast), border-color var(--transition-fast), background var(--transition-fast);
    border-radius: var(--radius-sm) var(--radius-sm) 0 0;
    -webkit-tap-highlight-color: transparent;
    appearance: none;
    -webkit-appearance: none;
  }
  .tab-btn::-moz-focus-inner {
    border: 0;
    padding: 0;
  }
  .tab-btn:hover:not(.active) { color: var(--color-primary); background: var(--color-bg-hover); }
  .tab-btn:active { background: transparent; }
  .tab-btn.active { color: var(--color-primary); border-bottom-color: var(--color-primary); background: var(--color-primary-light); }

  /* AI tab: sparkles left of label */
  .tab-btn--ai {
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    gap: 3px;
    white-space: nowrap;
  }
  .tab-btn--ai .tab-btn-ai-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    line-height: 0;
    color: inherit;
    transform-origin: center center;
    transform: rotate(0deg);
    transition: transform 0.6s ease;
  }
  .tab-btn--ai:hover .tab-btn-ai-icon {
    transform: rotate(180deg);
  }
  .tab-btn--ai .tab-btn-ai-icon svg {
    width: 1em;
    height: 1em;
    display: block;
    flex-shrink: 0;
  }
  .tab-btn--ai .tab-btn-ai-label {
    flex-shrink: 0;
    white-space: nowrap;
    line-height: 1;
    padding: 0;
  }

  @media (prefers-reduced-motion: reduce) {
    .tab-btn--ai .tab-btn-ai-icon {
      transition: none;
      transform: none;
    }
    .tab-btn--ai:hover .tab-btn-ai-icon {
      transform: none;
    }
  }

  /* ─── Tab Content ─────────────────────────────────────────────────────────── */
  .tab-content { flex: 1; overflow: hidden; min-height: 0; }
  .tab-panel { display: none; flex-direction: column; height: 100%; }
  .tab-panel.active { display: flex; }

  /* ─── Direct Insert (Browse) ──────────────────────────────────────────────── */
  .direct-insert-form { padding: var(--space-lg) var(--sidebar-inline); flex-shrink: 0; }
  .form-group { margin-bottom: var(--space-md); }
  .form-group label { display: block; font-weight: 500; margin-bottom: var(--space-xs); font-size: 12px; color: var(--color-text-secondary); }
  .form-select, .form-input { width: 100%; padding: 8px 10px; border: 1px solid var(--color-border); border-radius: var(--radius-sm); font-size: 13px; }
  .form-select:focus, .form-input:focus { outline: none; border-color: var(--color-primary); box-shadow: 0 0 0 2px rgba(13, 110, 79, 0.12); }
  .form-row { display: flex; gap: var(--space-md); }
  .form-group-half { flex: 1; }
  .hint-inline { font-weight: 400; color: var(--color-text-muted); font-size: 11px; }
  .btn-block { width: 100%; }

  /* Browse: thinner Surah / From / To selects, less space above result cards */
  #panel-direct-insert .direct-insert-form { padding-bottom: var(--space-md); }
  #panel-direct-insert .results-list { padding-top: var(--space-md); }
  #panel-direct-insert .form-group { margin-bottom: var(--space-sm); }
  #panel-direct-insert .form-row .form-group { margin-bottom: 0; }
  #panel-direct-insert .form-select {
    font-size: 12px;
    padding: var(--space-sm);
    line-height: 1.3;
  }

  /* ─── Results ─────────────────────────────────────────────────────────────── */
  .results-list { flex: 1; overflow-y: auto; padding: var(--space-lg) var(--sidebar-inline); min-height: 0; }
  .result-card { padding: var(--space-md); border: 1px solid var(--color-border); border-radius: var(--radius-md); margin-bottom: var(--space-md); font-size: 12px; transition: border-color var(--transition-fast), box-shadow var(--transition-fast); }
.result-card:hover { box-shadow: var(--shadow-sm); }
  .result-card .ref-arabic { font-size: 11px; direction: rtl; text-align: right; color: #202124; margin-bottom: var(--space-xs); font-family: Amiri, serif; }
  .result-card .ref-english { font-size: 11px; color: #202124; margin-top: var(--space-xs); margin-bottom: var(--space-xs); }
  @keyframes arabic-font-in { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: translateY(0); } }
  .result-card .arabic {
    font-size: 16pt; direction: rtl; text-align: right; font-family: Amiri, serif; color: #202124; margin: var(--space-sm) 0; line-height: 1.8;
    animation: arabic-font-in 0.2s ease;
    transition: opacity 0.42s ease-out;
  }
  .result-card .arabic.font-preview-pending {
    animation: none;
    opacity: 0;
    transition: none;
  }
  .result-card .arabic.range-block { line-height: 2.2; white-space: normal; word-break: normal; }
  .result-card mark { background: #fff59d; padding: 0 2px; }
  .result-card .translation { font-size: 12px; color: #202124; margin: var(--space-sm) 0 0; line-height: 1.5; }
  .result-card .btn-toggle-translation { display: inline-block; font-size: 11px; color: var(--color-primary); cursor: pointer; margin-top: var(--space-xs); user-select: none; }
  .result-card .btn-toggle-translation:hover { text-decoration: underline; }
  .result-card .btn-insert-result { display: block; width: 100%; margin-top: var(--space-sm); padding: var(--space-sm) var(--space-md); font-size: 12px; }

  /* ─── Clarify Message ─────────────────────────────────────────────────────── */
  .clarify-message { padding: var(--space-md) var(--sidebar-inline); margin: var(--space-sm) var(--sidebar-inline); background: var(--color-bg-hover); border-radius: var(--radius-md); font-size: 13px; color: var(--color-text-primary); line-height: 1.5; }

  /* ─── Loading & Empty States ──────────────────────────────────────────────── */
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty-state { color: var(--color-text-secondary); font-size: 13px; padding: 24px var(--sidebar-inline); text-align: center; }
  .cache-status { display: flex; align-items: center; gap: var(--space-sm); padding: 6px var(--sidebar-inline); font-size: 12px; }
  .cache-status-text { color: var(--color-text-muted); }
  .cache-status-error { color: var(--color-error); }
  .cache-status-retry { font-size: 12px; padding: 2px 8px; border: 1px solid var(--color-error); border-radius: var(--radius-sm); background: none; color: var(--color-error); cursor: pointer; }

  /* ─── Startup Overlay ─────────────────────────────────────────────────────── */
  .startup-overlay { position: absolute; inset: 0; background: var(--color-bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; gap: var(--space-md); }
  .startup-spinner { width: 32px; height: 32px; border: 3px solid var(--color-border); border-top-color: var(--color-primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
  .startup-text { font-size: 13px; color: var(--color-text-muted); }
  .ai-search-loading { display: flex; align-items: center; justify-content: center; min-height: 120px; padding: var(--space-lg) 0; }
  /* AI tab: fill scroll area so the startup-style spinner sits vertically centered */
  #panel-ai-search .results-list:has(> .ai-search-loading:only-child) {
    display: flex;
    flex-direction: column;
  }
  #panel-ai-search .results-list > .ai-search-loading:only-child {
    flex: 1;
    min-height: 0;
  }

  /* ─── Skeleton Cards ──────────────────────────────────────────────────────── */
  .skeleton-card { border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: var(--space-md); margin-bottom: var(--space-md); }
  .skeleton-line { height: 12px; background: var(--color-border); border-radius: 3px; margin-bottom: var(--space-sm); animation: skeleton-pulse 1.4s ease-in-out infinite; }
  .skeleton-line:last-child { margin-bottom: 0; }
  .sk-short { width: 40%; }
  .sk-arabic { height: 20px; width: 85%; margin-left: auto; }
  .sk-medium { width: 70%; }
  .sk-long { width: 100%; }
  @keyframes skeleton-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* ─── Insert Button Spinner (absolute center; invisible label keeps normal line box so height matches idle state) ─ */
  .btn-insert-result.btn-loading {
    position: relative;
    color: transparent !important;
    text-shadow: none;
    pointer-events: none;
  }
  .btn-insert-result.btn-loading::after {
    content: '';
    position: absolute;
    left: 50%;
    top: 50%;
    width: 14px;
    height: 14px;
    margin: -7px 0 0 -7px;
    box-sizing: border-box;
    border: 2px solid rgba(255,255,255,0.5);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  /* ─── Input Area ──────────────────────────────────────────────────────────── */
  .tab-input-area { flex-shrink: 0; padding: var(--space-sm); border-top: 1px solid var(--color-border); background: var(--color-bg); }
  /* Exact Search: match AI strip — air above field, no top rule */
  #panel-exact-search .tab-input-area {
    border-top: none;
    padding-top: var(--space-lg);
    padding-bottom: var(--space-md);
  }
  .tab-input-wrap { display: flex; align-items: flex-end; gap: var(--space-sm); }
  .tab-input-wrap textarea { flex: 1; padding: 10px 12px; border: 1px solid var(--color-border); border-radius: var(--radius-md); font-size: 13px; font-family: inherit; resize: none; line-height: 1.4; min-height: 40px; max-height: 120px; overflow-y: auto; }
  .tab-input-wrap textarea:focus { outline: none; border-color: var(--color-primary); }
  /* AI Search: composer stack — no top rule; padding replaces border */
  #panel-ai-search .tab-input-area {
    display: flex;
    flex-direction: column;
    border-top: none;
    padding-top: var(--space-lg);
    padding-left: var(--space-sm);
    padding-right: var(--space-sm);
    padding-bottom: var(--space-md);
    gap: var(--space-md);
  }
  /* AI Search: send inside bordered composer */
  #panel-ai-search .tab-input-wrap--composer {
    position: relative;
    align-items: stretch;
    gap: 0;
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    background: var(--color-bg);
    transition: border-color var(--transition-fast);
  }
  #panel-ai-search .tab-input-wrap--composer:focus-within {
    border-color: var(--color-primary);
  }
  #panel-ai-search .tab-input-wrap--composer textarea {
    flex: 1;
    min-height: 44px;
    max-height: 120px;
    padding: 10px 44px 10px 12px;
    border: none;
    border-radius: var(--radius-lg);
    background: transparent;
    resize: none;
  }
  #panel-ai-search .tab-input-wrap--composer textarea:focus { outline: none; border-color: transparent; }
  #panel-ai-search .tab-input-wrap--composer .btn-send {
    position: absolute;
    right: 6px;
    bottom: 6px;
    width: 32px;
    height: 32px;
    font-size: 0;
    line-height: 0;
  }
  #panel-ai-search .tab-input-wrap--composer .btn-send svg {
    width: 20px;
    height: 20px;
    display: block;
  }
  .btn-send { width: 36px; height: 36px; border: none; background: var(--color-primary); color: #fff; border-radius: 50%; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .btn-send:hover { background: var(--color-primary-hover); }
  .btn-send:disabled { background: var(--color-primary); opacity: 0.4; cursor: not-allowed; }

  /* ─── Buttons ─────────────────────────────────────────────────────────────── */
  .btn-primary { padding: 8px var(--space-lg); background: var(--color-primary); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 13px; cursor: pointer; }
  .btn-primary:hover { background: var(--color-primary-hover); }
  .btn-primary:disabled { background: var(--color-primary); opacity: 0.4; cursor: not-allowed; }
  .btn-secondary { padding: 8px var(--space-lg); background: var(--color-bg-secondary); color: var(--color-text-primary); border: 1px solid var(--color-border); border-radius: var(--radius-sm); font-size: 13px; cursor: pointer; }
  .btn-secondary:hover { background: var(--color-bg-hover); }

  .btn-show-more { display: block; width: 100%; padding: 10px; margin-top: var(--space-xs); border: 1px dashed var(--color-border); border-radius: var(--radius-sm); background: none; color: var(--color-primary); font-size: 13px; cursor: pointer; text-align: center; }
  .btn-show-more:hover { background: var(--color-bg-secondary); border-color: var(--color-primary); }

  .btn-icon { padding: var(--space-sm); border: none; background: none; cursor: pointer; color: var(--color-text-secondary); border-radius: var(--radius-sm); font-size: 16px; }
  .btn-icon:hover:not(:disabled) { background: var(--color-bg-hover); color: var(--color-text-primary); }
  .btn-icon:disabled { opacity: 0.35; cursor: not-allowed; pointer-events: none; }
  .btn-icon svg { display: block; }

  /* ─── Settings Page ───────────────────────────────────────────────────────── */
  .settings-page { display: flex; flex-direction: column; flex: 1; overflow-y: auto; }
  .settings-page.hidden { display: none !important; }
  .settings-header { display: flex; align-items: center; gap: var(--space-sm); padding: var(--space-md) var(--sidebar-inline); border-bottom: 1px solid var(--color-border); flex-shrink: 0; }
  .settings-title { margin: 0; font-size: 16px; font-weight: 600; color: var(--color-text-primary); }
  .settings-body { padding: var(--space-xl) var(--sidebar-inline); }
  .settings-panel-loading { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: var(--space-md); min-height: 120px; padding: var(--space-sm) 0 var(--space-lg); }
  .settings-panel-loading .startup-spinner { flex-shrink: 0; }
  .settings-section { margin-bottom: var(--space-xl); }
  .settings-section-title { margin: 0 0 var(--space-lg); font-size: 14px; font-weight: 600; color: var(--color-text-primary); }
  .settings-row {
    display: flex;
    align-items: center;
    gap: var(--space-lg);
    padding: var(--space-md) 0;
    border-bottom: 1px solid var(--color-border);
  }
  .settings-row-label {
    flex: 1;
    min-width: 0;
    font-size: 13px;
    font-weight: 400;
    color: var(--color-text-primary);
    cursor: pointer;
  }
  .settings-row .toggle-switch { margin-inline-start: auto; }

  /* Toggle switch */
  .toggle-switch { position: relative; display: inline-block; width: 40px; height: 22px; flex-shrink: 0; }
  .toggle-switch input { opacity: 0; width: 0; height: 0; position: absolute; }
  .toggle-slider {
    position: absolute; inset: 0;
    background: var(--color-border-hover);
    border-radius: var(--radius-full);
    transition: background var(--transition-fast);
    cursor: pointer;
  }
  .toggle-slider::before {
    content: '';
    position: absolute;
    width: 18px; height: 18px;
    left: 2px; bottom: 2px;
    background: white;
    border-radius: 50%;
    transition: transform var(--transition-fast);
    box-shadow: var(--shadow-sm);
  }
  .toggle-switch input:checked + .toggle-slider { background: var(--color-primary); }
  .toggle-switch input:checked + .toggle-slider::before { transform: translateX(18px); }

  /* ─── Search Welcome ──────────────────────────────────────────────────────── */
  .search-welcome {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    flex: 1; padding: var(--space-xl) var(--sidebar-inline); text-align: center; gap: var(--space-md);
  }
  .search-welcome-icon { color: var(--color-text-muted); opacity: 0.5; }
  .search-welcome-title { font-size: 15px; font-weight: 500; color: var(--color-text-primary); margin: 0; }
  .search-welcome-hint { font-size: 13px; color: var(--color-text-muted); margin: 0; }

  /* ─── AI Welcome ──────────────────────────────────────────────────────────── */
  .ai-welcome {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    flex: 1; padding: var(--space-xl) var(--sidebar-inline); text-align: center; gap: var(--space-xl);
  }
  .ai-welcome-greeting { font-size: 16px; font-weight: 600; color: var(--color-text-primary); margin: 0; }
  .ai-welcome-hint { font-size: 13px; color: var(--color-text-muted); margin: var(--space-xs) 0 0; }
  .ai-welcome-chips { display: flex; flex-direction: column; gap: var(--space-sm); width: 100%; max-width: 260px; }
  .ai-chip {
    padding: var(--space-sm) var(--space-lg);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-full);
    background: var(--color-bg);
    font-size: 13px;
    color: var(--color-text-primary);
    cursor: pointer;
    text-align: center;
    transition: background var(--transition-fast), border-color var(--transition-fast), color var(--transition-fast);
  }
  .ai-chip:hover { background: var(--color-primary-light); border-color: var(--color-primary); color: var(--color-primary); }

  /* AI query bar (above results; not cleared by pagination) */
  .ai-query-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-sm);
    flex-shrink: 0;
    padding: var(--space-sm) var(--sidebar-inline) 0;
    border-bottom: 1px solid var(--color-border);
  }
  .ai-query-bar-main {
    display: flex;
    align-items: center;
    gap: 6px;
    min-width: 0;
    flex: 1;
  }
  .ai-query-label {
    flex-shrink: 0;
    font-size: 12px;
    line-height: 1.3;
    color: var(--color-text-muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .ai-query-text {
    flex: 1;
    min-width: 0;
    font-size: 12px;
    line-height: 1.3;
    color: var(--color-text-primary);
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .ai-query-bar-new-chat { flex-shrink: 0; color: var(--color-text-secondary); }
  .ai-query-bar-new-chat:hover:not(:disabled) { color: var(--color-primary); }

  /* AI disclaimer */
  .ai-disclaimer {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: var(--space-xs);
    margin: 0;
    padding: 0;
    font-size: 11px;
    color: var(--color-text-muted);
    text-align: center;
    flex-shrink: 0;
  }

  /* ─── Bottom Bar ──────────────────────────────────────────────────────────── */
  .bottom-bar { flex-shrink: 0; border-top: 1px solid var(--color-border); padding: var(--space-xs); background: var(--color-bg-secondary); }
  .bottom-bar-inner {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
  }
  .bottom-bar-wordmark {
    display: flex;
    align-items: center;
    flex-shrink: 0;
    justify-self: start;
    min-width: 0;
  }
  .bottom-bar-center {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: var(--space-md);
    justify-self: center;
    min-width: 0;
    flex-wrap: wrap;
  }
  .bottom-bar-cta {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 0;
    border: none;
    background: none;
    font: inherit;
    font-size: 11px;
    color: var(--color-text-secondary);
    text-decoration: none;
    white-space: nowrap;
    cursor: pointer;
    transition: color var(--transition-fast);
  }
  .bottom-bar-cta--support { font-weight: 700; }
  .bottom-bar-cta:hover,
  .bottom-bar-cta:focus { color: var(--color-primary); outline: none; }
  .bottom-bar-cta:focus-visible { text-decoration: underline; }
  .bottom-bar-cta svg {
    width: 14px;
    height: 14px;
    flex-shrink: 0;
    display: block;
  }
  /* Material Symbols (fonts.googleapis.com); axes match static request opsz,wght,FILL,GRAD@24,400,1,0 */
  .material-symbols-outlined {
    font-variation-settings:
      'FILL' 1,
      'wght' 400,
      'GRAD' 0,
      'opsz' 24;
    color: currentColor;
  }
  .bottom-bar-cta .material-symbols-outlined {
    font-size: 14px;
    font-weight: 400;
    line-height: 1;
    flex-shrink: 0;
    user-select: none;
  }
