<script>
(function() {
  'use strict';

  var formatState = {
    fontName: 'Amiri',
    fontSize: 18,
    bold: false,
    textColor: '#000000'
  };

  var saveDebounceTimer = null;
  var SAVE_DEBOUNCE_MS = 500;

  function debouncedSave() {
    if (saveDebounceTimer) clearTimeout(saveDebounceTimer);
    saveDebounceTimer = setTimeout(function() {
      google.script.run
        .withFailureHandler(function(err) { console.error('Save settings failed:', err); })
        .saveSettings({
          fontName: formatState.fontName,
          fontSize: formatState.fontSize,
          bold: formatState.bold,
          textColor: formatState.textColor
        });
      saveDebounceTimer = null;
    }, SAVE_DEBOUNCE_MS);
  }

  function applyFormatStateToUI() {
    var fontSelect = document.getElementById('font-select');
    var sizeSelect = document.getElementById('size-select');
    var boldBtn = document.getElementById('btn-bold');
    var colorPicker = document.getElementById('color-picker');
    var colorTrigger = document.getElementById('color-trigger');
    if (fontSelect) fontSelect.value = formatState.fontName;
    if (sizeSelect) {
      var sizeVal = String(formatState.fontSize);
      if (sizeSelect.querySelector('option[value="' + sizeVal + '"]')) {
        sizeSelect.value = sizeVal;
      } else {
        sizeSelect.value = '18';
      }
    }
    if (boldBtn) boldBtn.classList.toggle('active', formatState.bold);
    if (colorPicker) colorPicker.value = formatState.textColor;
    if (colorTrigger) colorTrigger.style.backgroundColor = formatState.textColor;
  }

  function initFormatBar() {
    var fontSelect = document.getElementById('font-select');
    var sizeSelect = document.getElementById('size-select');
    var boldBtn = document.getElementById('btn-bold');
    var colorTrigger = document.getElementById('color-trigger');
    var colorPicker = document.getElementById('color-picker');

    if (fontSelect) {
      fontSelect.addEventListener('change', function() {
        formatState.fontName = fontSelect.value;
        debouncedSave();
      });
    }

    if (sizeSelect) {
      sizeSelect.addEventListener('change', function() {
        formatState.fontSize = parseInt(sizeSelect.value, 10) || 18;
        debouncedSave();
      });
    }

    if (boldBtn) {
      boldBtn.addEventListener('click', function() {
        formatState.bold = !formatState.bold;
        boldBtn.classList.toggle('active', formatState.bold);
        debouncedSave();
      });
    }

    if (colorTrigger && colorPicker) {
      colorTrigger.addEventListener('click', function() {
        colorPicker.click();
      });
      function onColorChange() {
        formatState.textColor = colorPicker.value;
        colorTrigger.style.backgroundColor = colorPicker.value;
        debouncedSave();
      }
      colorPicker.addEventListener('input', onColorChange);
      colorPicker.addEventListener('change', onColorChange);
    }
  }

  function initTabs() {
    var tabs = document.querySelectorAll('.tab');
    var panes = document.querySelectorAll('.tab-pane');
    tabs.forEach(function(tab) {
      tab.addEventListener('click', function() {
        var target = tab.getAttribute('data-tab');
        tabs.forEach(function(t) { t.classList.remove('active'); });
        panes.forEach(function(p) {
          p.classList.remove('active');
          if (p.id === 'tab-' + target) p.classList.add('active');
        });
        tab.classList.add('active');
      });
    });
  }

  function initSettings() {
    var btnSettings = document.getElementById('btn-settings');
    var overlay = document.getElementById('settings-overlay');
    var btnBack = document.getElementById('btn-settings-back');

    if (btnSettings && overlay) {
      btnSettings.addEventListener('click', function() {
        overlay.classList.remove('hidden');
        loadSettingsIntoPanel();
      });
    }

    if (btnBack && overlay) {
      btnBack.addEventListener('click', function() {
        overlay.classList.add('hidden');
        refreshBrowseSettings();
      });
    }

    function refreshBrowseSettings() {
      google.script.run.withSuccessHandler(function(s) {
        window._browseSettings = {
          insertMode: s.insertMode,
          showTranslation: s.showTranslation,
          arabicStyle: s.arabicStyle,
          translationEdition: s.translationEdition
        };
      }).getSettings();
    }
    overlay.addEventListener('click', function(e) {
      if (e.target === overlay) {
        overlay.classList.add('hidden');
        refreshBrowseSettings();
      }
    });
  }

  function loadSettingsIntoPanel() {
    google.script.run
      .withSuccessHandler(function(s) {
        var cursor = document.getElementById('insert-cursor');
        var newline = document.getElementById('insert-newline');
        var tag = document.getElementById('insert-tag');
        var edition = document.getElementById('translation-edition');
        var arabic = document.getElementById('insert-arabic');
        var trans = document.getElementById('insert-translation');
        var ref = document.getElementById('insert-reference');
        var apiKey = document.getElementById('claude-api-key');
        if (cursor) cursor.checked = (s.insertMode === 'cursor');
        if (newline) newline.checked = (s.insertMode === 'newline');
        if (tag) tag.checked = (s.insertMode === 'inserttag');
        if (edition) edition.value = s.translationEdition || 'sahih';
        if (arabic) arabic.checked = s.insertArabic !== false;
        if (trans) trans.checked = s.showTranslation !== false;
        if (ref) ref.checked = s.showReference !== false;
        if (apiKey) {
          google.script.run.withSuccessHandler(function(k) {
            apiKey.value = k || '';
            apiKey.placeholder = k ? '••••••••••' : 'sk-ant-...';
          }).getClaudeApiKey();
        }
      })
      .withFailureHandler(function() {})
      .getSettings();
  }

  function initSettingsPanelHandlers() {
    var insertRadios = document.querySelectorAll('input[name="insertMode"]');
    var edition = document.getElementById('translation-edition');
    var arabic = document.getElementById('insert-arabic');
    var trans = document.getElementById('insert-translation');
    var ref = document.getElementById('insert-reference');
    var btnSave = document.getElementById('btn-save-api-key');
    var apiKeyInput = document.getElementById('claude-api-key');

    insertRadios.forEach(function(r) {
      r.addEventListener('change', function() {
        google.script.run.withFailureHandler(function(){}).saveSetting('insertMode', r.value);
      });
    });

    if (edition) {
      edition.addEventListener('change', function() {
        google.script.run.withFailureHandler(function(){}).saveSetting('translationEdition', edition.value);
      });
    }

    if (arabic) {
      arabic.addEventListener('change', function() {
        google.script.run.withFailureHandler(function(){}).saveSetting('insertArabic', arabic.checked);
      });
    }
    if (trans) {
      trans.addEventListener('change', function() {
        google.script.run.withFailureHandler(function(){}).saveSetting('showTranslation', trans.checked);
      });
    }
    if (ref) {
      ref.addEventListener('change', function() {
        google.script.run.withFailureHandler(function(){}).saveSetting('showReference', ref.checked);
      });
    }

    if (btnSave && apiKeyInput) {
      btnSave.addEventListener('click', function() {
        var key = apiKeyInput.value.trim();
        google.script.run
          .withSuccessHandler(function() { apiKeyInput.placeholder = 'Saved'; })
          .withFailureHandler(function() {})
          .setClaudeApiKey(key);
      });
    }
  }

  function onSettingsLoaded(settings) {
    formatState.fontName = settings.fontName || 'Amiri';
    formatState.fontSize = settings.fontSize || 18;
    formatState.bold = settings.bold || false;
    formatState.textColor = settings.textColor || '#000000';
    applyFormatStateToUI();
  }

  function onFontsLoaded(fonts) {
    var fontSelect = document.getElementById('font-select');
    if (!fontSelect || !fonts || !fonts.length) return;
    fontSelect.innerHTML = '';
    fonts.forEach(function(f) {
      var opt = document.createElement('option');
      opt.value = f;
      opt.textContent = f;
      if (f === formatState.fontName) opt.selected = true;
      fontSelect.appendChild(opt);
    });
    if (formatState.fontName && !fonts.some(function(f){ return f === formatState.fontName; })) {
      var fallback = document.createElement('option');
      fallback.value = formatState.fontName;
      fallback.textContent = formatState.fontName;
      fallback.selected = true;
      fontSelect.insertBefore(fallback, fontSelect.firstChild);
    }
  }

  function initBrowseTab() {
    var surahSelect = document.getElementById('surah-select');
    var ayahSelect = document.getElementById('ayah-select');
    var preview = document.getElementById('browse-preview');
    var btnInsert = document.getElementById('btn-insert-browse');

    google.script.run
      .withSuccessHandler(function(list) {
        if (!surahSelect || !list || !list.length) return;
        surahSelect.innerHTML = '<option value="">Select surah...</option>';
        list.forEach(function(s) {
          var opt = document.createElement('option');
          opt.value = s.number;
          opt.textContent = s.number + '. ' + s.nameArabic + ' \u2014 ' + s.nameEnglish;
          opt.setAttribute('data-ayah-count', s.ayahCount);
          surahSelect.appendChild(opt);
        });
      })
      .withFailureHandler(function() {})
      .getSurahListForBrowse();

    function onSurahChange() {
      var num = surahSelect.value;
      ayahSelect.disabled = !num;
      ayahSelect.innerHTML = '<option value="">Select ayah...</option>';
      preview.innerHTML = '';
      if (btnInsert) btnInsert.style.display = 'none';
      if (!num) return;
      var count = parseInt(surahSelect.options[surahSelect.selectedIndex].getAttribute('data-ayah-count') || '0', 10);
      for (var i = 1; i <= count; i++) {
        var opt = document.createElement('option');
        opt.value = i;
        opt.textContent = String(i);
        ayahSelect.appendChild(opt);
      }
    }

    function loadPreview() {
      var surahNum = parseInt(surahSelect.value, 10);
      var ayahNum = parseInt(ayahSelect.value, 10);
      if (!surahNum || !ayahNum) {
        preview.innerHTML = '';
        if (btnInsert) btnInsert.style.display = 'none';
        return;
      }
      var settings = window._browseSettings || {};
      var style = settings.arabicStyle || 'uthmani';
      var showTrans = settings.showTranslation !== false;

      preview.innerHTML = '<span class="browse-loading">Loading...</span>';
      if (btnInsert) btnInsert.style.display = 'none';

      google.script.run
        .withSuccessHandler(function(ayah) {
          if (!ayah) {
            preview.innerHTML = '<span class="empty-state">Ayah not found.</span>';
            return;
          }
          var font = (window.getFormatState && window.getFormatState().fontName) || 'Amiri';
          var html = '<div class="arabic" style="font-family:' + font + ',serif">' + escapeHtml(ayah.arabicText) + '</div>';
          if (showTrans) {
            html += '<div class="translation" style="font-size:12px;color:#666;margin-top:8px">' + escapeHtml(ayah.translationText || '(No translation available)') + '</div>';
          }
          preview.innerHTML = html;
          if (btnInsert) btnInsert.style.display = 'block';
        })
        .withFailureHandler(function() {
          preview.innerHTML = '<span class="empty-state">Failed to load ayah.</span>';
        })
        .getAyahForBrowse(surahNum, ayahNum, style);
    }

    function escapeHtml(s) {
      if (!s) return '';
      var d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function doInsert() {
      var surahNum = parseInt(surahSelect.value, 10);
      var ayahNum = parseInt(ayahSelect.value, 10);
      if (!surahNum || !ayahNum) return;
      var settings = window._browseSettings || {};
      var style = settings.arabicStyle || 'uthmani';

      if (btnInsert) btnInsert.disabled = true;

      google.script.run
        .withSuccessHandler(function(ayah) {
          if (!ayah) {
            if (btnInsert) btnInsert.disabled = false;
            return;
          }
          runInsert(ayah);
        })
        .withFailureHandler(function() {
          if (btnInsert) btnInsert.disabled = false;
        })
        .getAyahForBrowse(surahNum, ayahNum, style);
    }

    function runInsert(ayah) {
      var formatState = window.getFormatState ? window.getFormatState() : {};
      var settings = window._browseSettings || {};
      google.script.run
        .withSuccessHandler(function(result) {
          if (btnInsert) btnInsert.disabled = false;
        })
        .withFailureHandler(function(err) {
          if (btnInsert) btnInsert.disabled = false;
          console.error('Insert failed:', err);
        })
        .insertAyah(ayah, formatState, settings);
    }

    if (surahSelect) surahSelect.addEventListener('change', onSurahChange);
    if (ayahSelect) ayahSelect.addEventListener('change', loadPreview);

    if (btnInsert) btnInsert.addEventListener('click', doInsert);
  }

  var SEARCH_PAGE_SIZE = 20;
  var _searchAllResults = [];
  var _searchVisibleCount = 0;

  function initSearchTab() {
    var searchInput = document.getElementById('search-input');
    var btnSearch = document.getElementById('btn-search');
    var resultsEl = document.getElementById('search-results');
    var emptyEl = document.getElementById('search-empty');
    var loadingEl = document.getElementById('search-loading');
    var showMoreWrap = document.getElementById('search-show-more-wrap');
    var btnShowMore = document.getElementById('btn-search-show-more');

    function doSearch() {
      var query = searchInput ? searchInput.value.trim() : '';
      if (!query) return;

      loadingEl.classList.remove('hidden');
      resultsEl.innerHTML = '';
      emptyEl.classList.add('hidden');
      if (showMoreWrap && showMoreWrap.classList) showMoreWrap.classList.add('hidden');

      // Search always uses imlaei (simple) corpus - user-typed Arabic matches imlaei form
      var style = 'simple';

      google.script.run
        .withSuccessHandler(function(results) {
          loadingEl.classList.add('hidden');
          _searchAllResults = results || [];
          _searchVisibleCount = Math.min(SEARCH_PAGE_SIZE, _searchAllResults.length);
          renderSearchResults();
        })
        .withFailureHandler(function() {
          loadingEl.classList.add('hidden');
          emptyEl.textContent = 'Search failed. Please try again.';
          emptyEl.classList.remove('hidden');
        })
        .runSearchExact(query, style);
    }

    function renderSearchResults() {
      resultsEl.innerHTML = '';
      if (_searchAllResults.length === 0) {
        emptyEl.classList.remove('hidden');
        return;
      }
      emptyEl.classList.add('hidden');

      var font = (window.getFormatState && window.getFormatState().fontName) || 'Amiri';
      var visible = _searchAllResults.slice(0, _searchVisibleCount);

      visible.forEach(function(r, idx) {
        var card = document.createElement('div');
        card.className = 'result-card';
        var refLabel = (r.surahNameEnglish || 'Surah') + ' ' + r.surah + ':' + r.ayah;
        var arabicHtml = escapeHtml(r.arabicText);
        if (r.matchStart != null && r.matchEnd != null && r.matchEnd > r.matchStart) {
          var before = escapeHtml(r.arabicText.substring(0, r.matchStart));
          var match = escapeHtml(r.arabicText.substring(r.matchStart, r.matchEnd));
          var after = escapeHtml(r.arabicText.substring(r.matchEnd));
          arabicHtml = before + '<mark>' + match + '</mark>' + after;
        }
        card.innerHTML =
          '<div class="ref">' + escapeHtml(refLabel) + '</div>' +
          '<div class="arabic" style="font-family:' + font + ',serif">' + arabicHtml + '</div>' +
          '<button type="button" class="btn-primary btn-insert-result" data-surah="' + r.surah + '" data-ayah="' + r.ayah + '">Insert</button>';
        resultsEl.appendChild(card);
      });

      if (showMoreWrap) {
        if (_searchVisibleCount < _searchAllResults.length) {
          showMoreWrap.classList.remove('hidden');
        } else {
          showMoreWrap.classList.add('hidden');
        }
      }
    }

    function escapeHtml(s) {
      if (!s) return '';
      var d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function onInsertClick(e) {
      var btn = e.target;
      if (btn.tagName !== 'BUTTON' || !btn.classList.contains('btn-insert-result')) return;
      var surah = parseInt(btn.getAttribute('data-surah'), 10);
      var ayah = parseInt(btn.getAttribute('data-ayah'), 10);
      if (!surah || !ayah) return;

      btn.disabled = true;
      var settings = window._browseSettings || {};
      var edition = settings.translationEdition || 'sahih';

      google.script.run
        .withSuccessHandler(function(ayahData) {
          if (!ayahData) {
            btn.disabled = false;
            return;
          }
          var formatState = window.getFormatState ? window.getFormatState() : {};
          google.script.run
            .withSuccessHandler(function() {
              btn.disabled = false;
            })
            .withFailureHandler(function(err) {
              btn.disabled = false;
              console.error('Insert failed:', err);
            })
            .insertAyah(ayahData, formatState, settings);
        })
        .withFailureHandler(function() {
          btn.disabled = false;
        })
        .getAyahForSearchInsert(surah, ayah, edition);
    }

    if (searchInput) {
      searchInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') doSearch();
      });
    }
    if (btnSearch) btnSearch.addEventListener('click', doSearch);
    if (resultsEl) resultsEl.addEventListener('click', onInsertClick);
    if (btnShowMore) {
      btnShowMore.addEventListener('click', function() {
        _searchVisibleCount = Math.min(_searchVisibleCount + SEARCH_PAGE_SIZE, _searchAllResults.length);
        renderSearchResults();
      });
    }
  }

  function init() {
    google.script.run
      .withSuccessHandler(function(s) {
        onSettingsLoaded(s);
        window._browseSettings = {
          insertMode: s.insertMode,
          showTranslation: s.showTranslation,
          arabicStyle: s.arabicStyle,
          translationEdition: s.translationEdition
        };
      })
      .withFailureHandler(function() { applyFormatStateToUI(); })
      .getSettings();

    google.script.run
      .withSuccessHandler(onFontsLoaded)
      .withFailureHandler(function() {})
      .getArabicFonts();

    initFormatBar();
    initTabs();
    initSettings();
    initSettingsPanelHandlers();
    initBrowseTab();
    initSearchTab();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

  window.getFormatState = function() { return Object.assign({}, formatState); };
})();
</script>
