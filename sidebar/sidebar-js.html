<script>
(function() {
  'use strict';

  var formatState = {
    fontName: 'Amiri',
    fontSize: 18,
    bold: false,
    textColor: '#000000'
  };

  var _settings = {};
  var saveDebounceTimer = null;
  var SAVE_DEBOUNCE_MS = 500;

  // ─── Cache URLs ──────────────────────────────────────────────────────────────

  var UTHMANI_URL     = 'https://tarazis.github.io/tasneef-data/quran/uthmani.json';
  var IMLAEI_URL      = 'https://tarazis.github.io/tasneef-data/quran/imlaei-simple.json';
  var SURAH_META_URL  = 'https://tarazis.github.io/tasneef-data/quran/quran-metadata-surah-name.json';
  var TRANSLATION_URL = 'https://tarazis.github.io/tasneef-data/quran/en-sahih-international-simple.json';

  // ─── Client-side Quran / translation caches (makeClientCache from sidebar/client-cache) ──

  var _uthmaniCacheApi = makeClientCache({
    url: UTHMANI_URL,
    statusElId: 'uthmani-cache-status',
    loadingMsg: 'Loading Quran text\u2026',
    errorMsg: 'Failed to load Quran text.',
    logLabel: 'Uthmani cache'
  });

  function _parseTranslationData(obj) {
    var map = {};
    for (var key in obj) {
      if (obj.hasOwnProperty(key) && obj[key] && obj[key].t) {
        map[key] = obj[key].t;
      }
    }
    return map;
  }

  var _translationCacheApi = makeClientCache({
    url: TRANSLATION_URL,
    statusElId: 'translation-cache-status',
    loadingMsg: 'Loading translations\u2026',
    errorMsg: 'Failed to load translations.',
    parseData: _parseTranslationData,
    logLabel: 'Translation cache'
  });

  /**
   * Ensures uthmani.json is fetched and cached. Fetches at most once; subsequent calls queue callbacks.
   * @param {Function} [onReady]
   * @param {Function} [onError]
   */
  function ensureUthmaniCache(onReady, onError) {
    _uthmaniCacheApi.ensure(onReady, onError);
  }

  /**
   * @param {number} surahNum
   * @param {number} ayahNum
   * @return {{surah, ayah, text}|null}
   */
  function lookupUthmaniAyah(surahNum, ayahNum) {
    return _uthmaniCacheApi.lookup(surahNum, ayahNum);
  }

  /**
   * Ensures the current translation edition JSON is fetched and parsed. At most once per URL.
   * @param {Function} [onReady]
   * @param {Function} [onError]
   */
  function ensureTranslationCache(onReady, onError) {
    _translationCacheApi.ensure(onReady, onError);
  }

  /**
   * Loads a different translation edition by URL, replacing the current cache.
   * @param {string} url
   * @param {Function} [onReady]
   * @param {Function} [onError]
   */
  function loadTranslationEdition(url, onReady, onError) {
    _translationCacheApi.loadEdition(url, onReady, onError);
  }

  /**
   * @param {number} surahNum
   * @param {number} ayahNum
   * @return {string|null}
   */
  function lookupTranslation(surahNum, ayahNum) {
    return _translationCacheApi.lookup(surahNum, ayahNum);
  }

  // ─── Client-side Imlaei (simple) cache with pre-normalized index ──

  function _parseImlaeiData(rawMap) {
    var raw = {};
    var normalized = {};
    for (var key in rawMap) {
      raw[key] = rawMap[key];
      normalized[key] = normalizeArabic((rawMap[key].text || ''));
    }
    return { raw: raw, normalized: normalized };
  }

  var _imlaeiCacheApi = makeClientCache({
    url: IMLAEI_URL,
    statusElId: 'imlaei-cache-status',
    loadingMsg: 'Loading search index\u2026',
    errorMsg: 'Failed to load search index.',
    parseData: _parseImlaeiData,
    logLabel: 'Imlaei cache'
  });

  /**
   * Ensures imlaei-simple.json is fetched, parsed, and the normalized index is built.
   * @param {Function} [onReady]
   * @param {Function} [onError]
   */
  function ensureImlaeiCache(onReady, onError) {
    _imlaeiCacheApi.ensure(onReady, onError);
  }

  // ─── Client-side surah metadata cache ────────────────────────────────────────

  function _parseSurahMetaData(rawObj) {
    var list = [];
    for (var i = 1; i <= 114; i++) {
      var s = rawObj[String(i)];
      if (!s) continue;
      list.push({
        number: s.id,
        nameArabic: s.name_arabic || '',
        nameEnglish: s.name_simple || s.name || '',
        ayahCount: s.verses_count || 0
      });
    }
    return list;
  }

  var _surahMetaCacheApi = makeClientCache({
    url: SURAH_META_URL,
    statusElId: 'surah-meta-cache-status',
    loadingMsg: 'Loading surah list\u2026',
    errorMsg: 'Failed to load surah list.',
    parseData: _parseSurahMetaData,
    logLabel: 'Surah meta cache'
  });

  function ensureSurahMetaCache(onReady, onError) {
    _surahMetaCacheApi.ensure(onReady, onError);
  }

  // ─── Client-side exact search against imlaei cache ──

  var MAX_RESULTS = 50;
  var PAGE_SIZE = 10;
  var EXACT_DEBOUNCE_MS = 200;
  var EXACT_MIN_CHARS = 2;

  /**
   * Synchronous client-side search against the pre-normalized imlaei corpus.
   * Must be called after imlaei cache is loaded (ensure resolves synchronously post-load).
   * @param {string} query - Raw Arabic search text
   * @return {Array<{surah, ayah, surahNameArabic, surahNameEnglish, arabicText, matchStart, matchEnd}>}
   */
  function searchImlaeiClient(query) {
    if (!query || typeof query !== 'string') return [];
    query = query.trim();
    if (!query) return [];

    var data = null;
    _imlaeiCacheApi.ensure(function(d) { data = d; });
    if (!data) return [];

    var normalizedQuery = normalizeArabic(query);
    if (!normalizedQuery) return [];

    var results = [];
    var raw = data.raw;
    var normalized = data.normalized;

    for (var key in normalized) {
      if (results.length >= MAX_RESULTS) break;
      var matchIdx = normalized[key].indexOf(normalizedQuery);
      if (matchIdx < 0) continue;

      var verse = raw[key];
      var mapped = _mapNormalizedToOriginal(verse.text, matchIdx, normalizedQuery.length);
      var surahMeta = _surahList.find(function(s) { return s.number === verse.surah; });
      results.push({
        surah: verse.surah,
        ayah: verse.ayah,
        surahNameArabic: surahMeta ? surahMeta.nameArabic : '',
        surahNameEnglish: surahMeta ? surahMeta.nameEnglish : '',
        arabicText: verse.text || '',
        matchStart: mapped.start,
        matchEnd: mapped.end
      });
    }

    return results;
  }

  var _refreshDirectInsert = null;   // set by initDirectInsertTab, called by initFormatBar

  // ─── Format Bar ──────────────────────────────────────────────────────────────

  function debouncedSave() {
    if (saveDebounceTimer) clearTimeout(saveDebounceTimer);
    saveDebounceTimer = setTimeout(function() {
      google.script.run
        .withFailureHandler(function(err) { console.error('Save settings failed:', err); })
        .saveSettings({
          fontName: formatState.fontName,
          fontSize: formatState.fontSize,
          bold: formatState.bold,
          textColor: formatState.textColor
        });
      saveDebounceTimer = null;
    }, SAVE_DEBOUNCE_MS);
  }

  function applyFormatStateToUI() {
    var fontSelect = document.getElementById('font-select');
    var sizeSelect = document.getElementById('size-select');
    var boldBtn = document.getElementById('btn-bold');
    var colorPicker = document.getElementById('color-picker');
    var colorTrigger = document.getElementById('color-trigger');
    if (fontSelect) fontSelect.value = formatState.fontName;
    if (sizeSelect) {
      var sizeVal = String(formatState.fontSize);
      if (sizeSelect.querySelector('option[value="' + sizeVal + '"]')) {
        sizeSelect.value = sizeVal;
      } else {
        sizeSelect.value = '18';
      }
    }
    if (boldBtn) boldBtn.classList.toggle('active', formatState.bold);
    if (colorPicker) colorPicker.value = formatState.textColor;
    if (colorTrigger) colorTrigger.style.backgroundColor = formatState.textColor;
  }

  function initFormatBar() {
    var fontSelect = document.getElementById('font-select');
    var sizeSelect = document.getElementById('size-select');
    var boldBtn = document.getElementById('btn-bold');
    var colorTrigger = document.getElementById('color-trigger');
    var colorPicker = document.getElementById('color-picker');

    if (fontSelect) {
      fontSelect.addEventListener('change', function() {
        formatState.fontName = fontSelect.value;
        debouncedSave();
        if (_activeTab === 'direct-insert' && _refreshDirectInsert) _refreshDirectInsert();
      });
    }
    if (sizeSelect) {
      sizeSelect.addEventListener('change', function() {
        formatState.fontSize = parseInt(sizeSelect.value, 10) || 18;
        debouncedSave();
        if (_activeTab === 'direct-insert' && _refreshDirectInsert) _refreshDirectInsert();
      });
    }
    if (boldBtn) {
      boldBtn.addEventListener('click', function() {
        formatState.bold = !formatState.bold;
        boldBtn.classList.toggle('active', formatState.bold);
        debouncedSave();
        if (_activeTab === 'direct-insert' && _refreshDirectInsert) _refreshDirectInsert();
      });
    }
    if (colorTrigger && colorPicker) {
      colorTrigger.addEventListener('click', function() { colorPicker.click(); });
      function onColorChange() {
        formatState.textColor = colorPicker.value;
        colorTrigger.style.backgroundColor = colorPicker.value;
        debouncedSave();
        if (_activeTab === 'direct-insert' && _refreshDirectInsert) _refreshDirectInsert();
      }
      colorPicker.addEventListener('input', onColorChange);
      colorPicker.addEventListener('change', onColorChange);
    }
  }

  // ─── Settings ────────────────────────────────────────────────────────────────

  function initSettings() {
    var btnSettings = document.getElementById('btn-settings');
    var btnClear = document.getElementById('btn-clear');
    var overlay = document.getElementById('settings-overlay');
    var btnBack = document.getElementById('btn-settings-back');

    if (btnSettings && overlay) {
      btnSettings.addEventListener('click', function() {
        overlay.classList.remove('hidden');
        loadSettingsIntoPanel();
      });
    }
    if (btnClear) {
      btnClear.addEventListener('click', clearActiveTab);
    }
    if (btnBack && overlay) {
      btnBack.addEventListener('click', function() {
        overlay.classList.add('hidden');
        refreshSettings();
      });
    }
    if (overlay) {
      overlay.addEventListener('click', function(e) {
        if (e.target === overlay) {
          overlay.classList.add('hidden');
          refreshSettings();
        }
      });
    }
  }

  function refreshSettings() {
    google.script.run.withSuccessHandler(function(s) {
      _settings = s;
    }).getSettings();
  }

  function loadSettingsIntoPanel() {
    google.script.run
      .withSuccessHandler(function(s) {
        var trans = document.getElementById('insert-translation');
        var apiKey = document.getElementById('claude-api-key');
        if (trans) trans.checked = s.showTranslation !== false;
        if (apiKey) {
          // Never populate the input with the actual key value — check existence only
          google.script.run.withSuccessHandler(function(hasKey) {
            apiKey.value = '';
            apiKey.placeholder = hasKey ? '••••••••••' : 'sk-ant-...';
          }).hasClaudeApiKey();
        }
      })
      .withFailureHandler(function() {})
      .getSettings();
  }

  function initSettingsPanelHandlers() {
    var trans = document.getElementById('insert-translation');
    var btnSave = document.getElementById('btn-save-settings');
    var apiKeyInput = document.getElementById('claude-api-key');
    var savedMsg = document.getElementById('settings-saved-msg');

    function showSavedMessage(text, isError) {
      if (!savedMsg) return;
      savedMsg.textContent = text;
      savedMsg.className = 'settings-saved-msg ' + (isError ? 'error' : 'success');
      savedMsg.classList.remove('hidden');
      setTimeout(function() { savedMsg.classList.add('hidden'); }, 3000);
    }

    if (btnSave) {
      btnSave.addEventListener('click', function() {
        var showTranslation = trans ? trans.checked : true;
        var key = apiKeyInput ? apiKeyInput.value.trim() : '';

        btnSave.disabled = true;
        btnSave.textContent = 'Saving…';

        google.script.run
          .withSuccessHandler(function() {
            btnSave.disabled = false;
            btnSave.textContent = 'Save';
            // Save API key only if the user typed something
            if (key) {
              google.script.run
                .withSuccessHandler(function() {
                  if (apiKeyInput) { apiKeyInput.value = ''; apiKeyInput.placeholder = '••••••••••'; }
                })
                .withFailureHandler(function() {})
                .setClaudeApiKey(key);
            }
            showSavedMessage('Settings saved!', false);
          })
          .withFailureHandler(function() {
            btnSave.disabled = false;
            btnSave.textContent = 'Save';
            showSavedMessage('Failed to save settings.', true);
          })
          .saveSettings({ showTranslation: showTranslation });
      });
    }
  }

  function onSettingsLoaded(settings) {
    _settings = settings;
    formatState.fontName = settings.fontName || 'Amiri';
    formatState.fontSize = settings.fontSize || 18;
    formatState.bold = settings.bold || false;
    formatState.textColor = settings.textColor || '#000000';
    applyFormatStateToUI();
  }

  function onFontsLoaded(fonts) {
    var fontSelect = document.getElementById('font-select');
    if (!fontSelect || !fonts || !fonts.length) return;
    fontSelect.innerHTML = '';
    fonts.forEach(function(f) {
      var opt = document.createElement('option');
      opt.value = f;
      opt.textContent = f;
      if (f === formatState.fontName) opt.selected = true;
      fontSelect.appendChild(opt);
    });
    if (formatState.fontName && !fonts.some(function(f){ return f === formatState.fontName; })) {
      var fallback = document.createElement('option');
      fallback.value = formatState.fontName;
      fallback.textContent = formatState.fontName;
      fallback.selected = true;
      fontSelect.insertBefore(fallback, fontSelect.firstChild);
    }
  }

  // ─── Tab Navigation ──────────────────────────────────────────────────────────

  var _activeTab = 'direct-insert';

  function initTabNav() {
    var tabBtns = document.querySelectorAll('.tab-btn');
    tabBtns.forEach(function(btn) {
      btn.addEventListener('click', function() {
        switchTab(btn.getAttribute('data-tab'));
      });
    });
    switchTab('direct-insert');
  }

  function switchTab(tabId) {
    _activeTab = tabId;

    var tabBtns = document.querySelectorAll('.tab-btn');
    tabBtns.forEach(function(btn) {
      btn.classList.toggle('active', btn.getAttribute('data-tab') === tabId);
    });

    var panels = document.querySelectorAll('.tab-panel');
    panels.forEach(function(panel) {
      panel.classList.toggle('active', panel.id === 'panel-' + tabId);
    });

    if (tabId === 'direct-insert') {
      ensureUthmaniCache();      // no-op if already loading or loaded
      ensureTranslationCache();  // fires in parallel with uthmani fetch
    }
    if (tabId === 'exact-search') {
      ensureImlaeiCache();       // no-op if already loading or loaded
    }
  }

  function clearActiveTab() {
    switch (_activeTab) {
      case 'direct-insert':
        clearDirectInsert();
        break;
      case 'exact-search':
        clearExactSearch();
        break;
      case 'ai-search':
        clearAISearch();
        break;
    }
  }

  // ─── Shared Helpers ──────────────────────────────────────────────────────────

  function makeSkeleton(count) {
    var html = '';
    for (var i = 0; i < count; i++) {
      html += '<div class="skeleton-card">' +
        '<div class="skeleton-line sk-short"></div>' +
        '<div class="skeleton-line sk-arabic"></div>' +
        '<div class="skeleton-line sk-medium"></div>' +
        '<div class="skeleton-line sk-long"></div>' +
        '</div>';
    }
    return html;
  }

  // ─── Build results from server-returned references using client caches ─────

  /**
   * Validates and assembles full result objects from raw {surah, ayah} references
   * using in-memory caches (uthmani, imlaei, translation, surah metadata).
   * Acts as a hallucination guard — skips references that don't exist in cached data.
   * @param {Array<{surah: number, ayah: number}>} references
   * @return {Array<Object>} Result objects suitable for renderPreview() or pagReset()
   */
  function _buildResultsFromReferences(references) {
    var style = _settings.arabicStyle || 'uthmani';
    var imlaeiData = null;
    if (style === 'simple') {
      _imlaeiCacheApi.ensure(function(d) { imlaeiData = d; });
    }
    var results = [];
    for (var i = 0; i < references.length; i++) {
      var ref = references[i];
      var surahMeta = _surahList.find(function(s) { return s.number === ref.surah; });
      if (!surahMeta || ref.ayah > surahMeta.ayahCount) continue;

      var uthmaniData = lookupUthmaniAyah(ref.surah, ref.ayah);
      if (!uthmaniData) continue;

      var arabicText = uthmaniData.text;
      if (style === 'simple' && imlaeiData && imlaeiData.raw) {
        var entry = imlaeiData.raw[ref.surah + ':' + ref.ayah];
        if (entry && entry.text) arabicText = entry.text;
      }

      results.push({
        surah:            ref.surah,
        ayah:             ref.ayah,
        surahNameArabic:  surahMeta.nameArabic,
        surahNameEnglish: surahMeta.nameEnglish,
        arabicText:       arabicText,
        translationText:  lookupTranslation(ref.surah, ref.ayah) || ''
      });
    }
    return results;
  }

  /**
   * Builds a full ayah data object for insertion from client-side caches.
   * Returns the same shape that insertAyah() expects.
   * @param {number} surahNum
   * @param {number} ayahNum
   * @param {string} style - "uthmani" or "simple"
   * @return {Object|null}
   */
  function _buildAyahDataForInsert(surahNum, ayahNum, style) {
    var surahMeta = _surahList.find(function(s) { return s.number === surahNum; });
    var uthmaniData = lookupUthmaniAyah(surahNum, ayahNum);
    if (!uthmaniData) return null;

    var simpleText = '';
    var imlaeiData = null;
    _imlaeiCacheApi.ensure(function(d) { imlaeiData = d; });
    if (imlaeiData && imlaeiData.raw) {
      var entry = imlaeiData.raw[surahNum + ':' + ayahNum];
      if (entry) simpleText = entry.text || '';
    }

    var arabicText = (style === 'simple' && simpleText) ? simpleText : uthmaniData.text;

    return {
      surah: surahNum,
      ayah: ayahNum,
      surahNameArabic: surahMeta ? surahMeta.nameArabic : '',
      surahNameEnglish: surahMeta ? surahMeta.nameEnglish : '',
      arabicText: arabicText,
      textUthmani: uthmaniData.text,
      textSimple: simpleText,
      translationText: lookupTranslation(surahNum, ayahNum) || ''
    };
  }

  // ─── Rendering Modes ─────────────────────────────────────────────────────────

  /**
   * Preview mode: renders exactly one card into containerEl.
   * Single ayah → one card. Multiple ayahs → one combined range card.
   * Used by Insert tab always, and by AI Search for consecutive references.
   * @param {Element} containerEl
   * @param {Array<Object>} results
   */
  function renderPreview(containerEl, results) {
    containerEl.innerHTML = '';
    if (!results || results.length === 0) return;

    var font = formatState.fontName || 'Amiri';
    var card = document.createElement('div');
    card.className = 'result-card';

    if (results.length === 1) {
      card.innerHTML = buildCardHtml(results[0], font);
    } else {
      var rangeData = buildRangeData(results);
      rangeData.isRange = true;
      card.innerHTML = buildCardHtml(rangeData, font);
    }

    containerEl.appendChild(card);
  }

  // ─── Shared Pagination Module ─────────────────────────────────────────────────

  var _pagState = {};

  /**
   * Initialize or reset pagination state for a tab with a new results array.
   * @param {string} tabId
   * @param {Array<Object>} results
   */
  function pagReset(tabId, results) {
    _pagState[tabId] = { results: results || [], page: 0 };
  }

  /**
   * Render the next page of results for a tab.
   * Clears the container on page 0. Appends a "Show more" button if more results remain.
   * Tab switching does NOT reset state; only pagClear or pagReset do.
   * @param {string} tabId
   * @param {Element} containerEl
   * @param {Element} emptyEl
   * @param {string} emptyMsg - Message shown when results array is empty
   */
  function pagRenderPage(tabId, containerEl, emptyEl, emptyMsg) {
    var state = _pagState[tabId];
    if (!state) { state = { results: [], page: 0 }; _pagState[tabId] = state; }

    if (state.page === 0) {
      containerEl.innerHTML = '';
    }

    if (state.results.length === 0 && state.page === 0) {
      emptyEl.textContent = emptyMsg;
      emptyEl.classList.remove('hidden');
      return;
    }
    emptyEl.classList.add('hidden');

    var oldBtn = containerEl.querySelector('.btn-show-more');
    if (oldBtn) oldBtn.remove();

    var start = state.page * PAGE_SIZE;
    var end = Math.min(start + PAGE_SIZE, state.results.length);
    var font = formatState.fontName || 'Amiri';

    for (var i = start; i < end; i++) {
      var card = document.createElement('div');
      card.className = 'result-card';
      card.innerHTML = buildCardHtml(state.results[i], font);
      containerEl.appendChild(card);
    }

    state.page++;

    if (end < state.results.length) {
      var remaining = state.results.length - end;
      var showMore = document.createElement('button');
      showMore.type = 'button';
      showMore.className = 'btn-show-more';
      showMore.textContent = 'Show more (' + remaining + ' remaining)';
      (function(tid, cEl, eEl, msg) {
        showMore.addEventListener('click', function() {
          pagRenderPage(tid, cEl, eEl, msg);
        });
      }(tabId, containerEl, emptyEl, emptyMsg));
      containerEl.appendChild(showMore);
    }
  }

  /**
   * Clear pagination state for a tab. Called on new search or explicit clear actions.
   * @param {string} tabId
   */
  function pagClear(tabId) {
    _pagState[tabId] = { results: [], page: 0 };
  }

  /**
   * Shared insert handler for all tabs and all card types.
   * Detects range cards by the presence of data-ayah-start; rebuilds range data from
   * client caches at click time so no global state is needed and arabic-style is respected.
   */
  function onInsertClick(e) {
    var btn = e.target;
    if (btn.tagName !== 'BUTTON' || !btn.classList.contains('btn-insert-result')) return;

    btn.disabled = true;
    btn.classList.add('btn-loading');

    var fs = window.getFormatState ? window.getFormatState() : {};

    if (btn.getAttribute('data-ayah-start')) {
      var surah     = parseInt(btn.getAttribute('data-surah'), 10);
      var ayahStart = parseInt(btn.getAttribute('data-ayah-start'), 10);
      var ayahEnd   = parseInt(btn.getAttribute('data-ayah-end'), 10);
      if (!surah || !ayahStart || !ayahEnd) {
        btn.disabled = false;
        btn.classList.remove('btn-loading');
        return;
      }

      var style = _settings.arabicStyle || 'uthmani';
      var rangeItems = [];
      for (var i = ayahStart; i <= ayahEnd; i++) {
        var d = _buildAyahDataForInsert(surah, i, style);
        if (d) rangeItems.push(d);
      }

      if (!rangeItems.length) {
        btn.disabled = false;
        btn.classList.remove('btn-loading');
        return;
      }

      var rangeData = buildRangeData(rangeItems);

      google.script.run
        .withSuccessHandler(function(result) {
          btn.disabled = false;
          btn.classList.remove('btn-loading');
          if (result && !result.success) {
            console.warn('Range insert warning:', result.message);
          }
        })
        .withFailureHandler(function(err) {
          btn.disabled = false;
          btn.classList.remove('btn-loading');
          console.error('Range insert failed:', err);
        })
        .insertAyahRange(rangeData, fs, _settings);
      return;
    }

    var surahNum = parseInt(btn.getAttribute('data-surah'), 10);
    var ayahNum  = parseInt(btn.getAttribute('data-ayah'), 10);
    if (!surahNum || !ayahNum) {
      btn.disabled = false;
      btn.classList.remove('btn-loading');
      return;
    }

    var insertStyle = _settings.arabicStyle || 'uthmani';
    var ayahData = _buildAyahDataForInsert(surahNum, ayahNum, insertStyle);
    if (!ayahData) {
      btn.disabled = false;
      btn.classList.remove('btn-loading');
      return;
    }

    google.script.run
      .withSuccessHandler(function(result) {
        btn.disabled = false;
        btn.classList.remove('btn-loading');
        if (result && !result.success) {
          console.warn('Insert warning:', result.message);
        }
      })
      .withFailureHandler(function(err) {
        btn.disabled = false;
        btn.classList.remove('btn-loading');
        console.error('Insert failed:', err);
      })
      .insertAyah(ayahData, fs, _settings);
  }

  function setupTextarea(el, onSubmit) {
    if (!el) return;
    el.addEventListener('input', function() {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    });
    el.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        onSubmit();
      }
    });
  }

  // ─── Direct Insert Tab ───────────────────────────────────────────────────────

  var _surahList = [];

  function initDirectInsertTab() {
    var surahSelect = document.getElementById('surah-select');
    var ayahStart = document.getElementById('ayah-start');
    var ayahEnd = document.getElementById('ayah-end');
    var resultsEl = document.getElementById('direct-insert-results');
    var emptyEl = document.getElementById('direct-insert-empty');

    // Load surah list from client-side cache (tarazis.github.io)
    ensureSurahMetaCache(function(list) {
      _surahList = list || [];
      surahSelect.innerHTML = '';
      var placeholder = document.createElement('option');
      placeholder.value = '';
      placeholder.textContent = 'Select a Surah\u2026';
      surahSelect.appendChild(placeholder);
      _surahList.forEach(function(s) {
        var opt = document.createElement('option');
        opt.value = s.number;
        opt.textContent = s.number + '. ' + s.nameEnglish + ' - ' + s.nameArabic;
        surahSelect.appendChild(opt);
      });
    }, function() {
      surahSelect.innerHTML = '<option value="">Failed to load</option>';
    });

    function populateAyahSelect(selectEl, from, to, placeholder) {
      selectEl.innerHTML = '';
      var ph = document.createElement('option');
      ph.value = '';
      ph.textContent = placeholder;
      selectEl.appendChild(ph);
      for (var i = from; i <= to; i++) {
        var opt = document.createElement('option');
        opt.value = i;
        opt.textContent = i;
        selectEl.appendChild(opt);
      }
      selectEl.disabled = false;
    }

    function resetAyahSelects() {
      ayahStart.innerHTML = '<option value="">From</option>';
      ayahEnd.innerHTML = '<option value="">To</option>';
      ayahStart.disabled = true;
      ayahEnd.disabled = true;
    }

    function autoRenderPreview() {
      var surahNum = parseInt(surahSelect.value, 10);
      var startNum = parseInt(ayahStart.value, 10);
      var endNum   = ayahEnd.value ? parseInt(ayahEnd.value, 10) : null;

      resultsEl.innerHTML = '';
      emptyEl.classList.add('hidden');

      if (!surahNum || !startNum) return;

      var end = endNum || startNum;
      var rangeSize = end - startNum + 1;

      if (rangeSize > MAX_RESULTS) {
        emptyEl.textContent = 'Range too large. Maximum is ' + MAX_RESULTS + ' ayahs.';
        emptyEl.classList.remove('hidden');
        return;
      }

      var surahMeta = _surahList.find(function(s) { return s.number === surahNum; });
      var nameArabic  = surahMeta ? surahMeta.nameArabic  : '';
      var nameEnglish = surahMeta ? surahMeta.nameEnglish : '';

      var results = [];
      for (var i = startNum; i <= end; i++) {
        var ayahData = lookupUthmaniAyah(surahNum, i);
        if (!ayahData) {
          emptyEl.textContent = 'Arabic text still loading\u2026';
          emptyEl.classList.remove('hidden');
          return;
        }
        results.push({
          surah:            ayahData.surah,
          ayah:             ayahData.ayah,
          surahNameArabic:  nameArabic,
          surahNameEnglish: nameEnglish,
          arabicText:       ayahData.text,
          translationText:  lookupTranslation(surahNum, i) || ''
        });
      }

      renderPreview(resultsEl, results);
    }

    surahSelect.addEventListener('change', function() {
      var surahNum = parseInt(surahSelect.value, 10);
      var surah = _surahList.find(function(s) { return s.number === surahNum; });
      if (!surah) { resetAyahSelects(); resultsEl.innerHTML = ''; emptyEl.classList.add('hidden'); return; }
      populateAyahSelect(ayahStart, 1, surah.ayahCount, 'From');
      ayahEnd.innerHTML = '<option value="">To</option>';
      ayahEnd.disabled = true;
      autoRenderPreview();
    });

    ayahStart.addEventListener('change', function() {
      var surahNum = parseInt(surahSelect.value, 10);
      var surah = _surahList.find(function(s) { return s.number === surahNum; });
      var startVal = parseInt(ayahStart.value, 10);
      if (!surah || !startVal) {
        ayahEnd.innerHTML = '<option value="">To</option>';
        ayahEnd.disabled = true;
        autoRenderPreview();
        return;
      }
      var currentEnd = parseInt(ayahEnd.value, 10);
      populateAyahSelect(ayahEnd, startVal, surah.ayahCount, 'To');
      if (currentEnd && currentEnd >= startVal) {
        ayahEnd.value = String(currentEnd);
      }
      autoRenderPreview();
    });

    ayahEnd.addEventListener('change', function() {
      autoRenderPreview();
    });

    _refreshDirectInsert = autoRenderPreview;

    if (resultsEl) resultsEl.addEventListener('click', onInsertClick);
  }

  function clearDirectInsert() {
    var surahSelect = document.getElementById('surah-select');
    var ayahStart = document.getElementById('ayah-start');
    var ayahEnd = document.getElementById('ayah-end');
    var resultsEl = document.getElementById('direct-insert-results');
    var emptyEl = document.getElementById('direct-insert-empty');
    if (surahSelect) surahSelect.value = '';
    if (ayahStart) { ayahStart.innerHTML = '<option value="">From</option>'; ayahStart.disabled = true; }
    if (ayahEnd) { ayahEnd.innerHTML = '<option value="">To</option>'; ayahEnd.disabled = true; }
    if (resultsEl) resultsEl.innerHTML = '';
    if (emptyEl) { emptyEl.classList.add('hidden'); emptyEl.textContent = ''; }
  }

  // ─── Exact Search Tab ────────────────────────────────────────────────────────

  function initExactSearchTab() {
    var queryEl = document.getElementById('exact-search-query');
    var btnSearch = document.getElementById('btn-exact-search');
    var resultsEl = document.getElementById('exact-search-results');
    var emptyEl = document.getElementById('exact-search-empty');
    var debounceTimer = null;

    function doExactSearch() {
      if (debounceTimer) { clearTimeout(debounceTimer); debounceTimer = null; }

      var query = queryEl ? queryEl.value.trim() : '';
      if (!query) {
        pagClear('exact-search');
        if (resultsEl) resultsEl.innerHTML = '';
        if (emptyEl) { emptyEl.classList.add('hidden'); emptyEl.textContent = ''; }
        return;
      }
      if (query.length < EXACT_MIN_CHARS) {
        pagClear('exact-search');
        if (resultsEl) resultsEl.innerHTML = '';
        if (emptyEl) {
          emptyEl.textContent = 'Type at least ' + EXACT_MIN_CHARS + ' characters\u2026';
          emptyEl.classList.remove('hidden');
        }
        return;
      }

      pagReset('exact-search', searchImlaeiClient(query));
      pagRenderPage('exact-search', resultsEl, emptyEl, 'No exact matches found.');
    }

    queryEl.addEventListener('input', function() {
      queryEl.style.height = 'auto';
      queryEl.style.height = Math.min(queryEl.scrollHeight, 120) + 'px';

      var val = queryEl.value;
      if (!val || !val.trim()) {
        if (debounceTimer) { clearTimeout(debounceTimer); debounceTimer = null; }
        pagClear('exact-search');
        if (resultsEl) resultsEl.innerHTML = '';
        if (emptyEl) { emptyEl.classList.add('hidden'); emptyEl.textContent = ''; }
        return;
      }
      if (val.trim().length < EXACT_MIN_CHARS) {
        if (debounceTimer) { clearTimeout(debounceTimer); debounceTimer = null; }
        pagClear('exact-search');
        if (resultsEl) resultsEl.innerHTML = '';
        if (emptyEl) {
          emptyEl.textContent = 'Type at least ' + EXACT_MIN_CHARS + ' characters\u2026';
          emptyEl.classList.remove('hidden');
        }
        return;
      }
      if (debounceTimer) clearTimeout(debounceTimer);
      debounceTimer = setTimeout(doExactSearch, EXACT_DEBOUNCE_MS);
    });

    queryEl.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        doExactSearch();
      }
    });

    if (btnSearch) btnSearch.addEventListener('click', doExactSearch);
    if (resultsEl) resultsEl.addEventListener('click', onInsertClick);
  }

  function clearExactSearch() {
    pagClear('exact-search');
    var queryEl = document.getElementById('exact-search-query');
    var resultsEl = document.getElementById('exact-search-results');
    var emptyEl = document.getElementById('exact-search-empty');
    if (queryEl) { queryEl.value = ''; queryEl.style.height = 'auto'; }
    if (resultsEl) resultsEl.innerHTML = '';
    if (emptyEl) { emptyEl.classList.add('hidden'); emptyEl.textContent = ''; }
  }

  // ─── AI Search Tab ───────────────────────────────────────────────────────────

  var _conversationMessages = [];

  function initAISearchTab() {
    var queryEl = document.getElementById('ai-search-query');
    var btnSend = document.getElementById('btn-ai-search');
    var resultsEl = document.getElementById('ai-search-results');
    var clarifyEl = document.getElementById('ai-search-clarify');
    var emptyEl = document.getElementById('ai-search-empty');
    var noKeyEl = document.getElementById('ai-no-key');

    function setEnabled(enabled) {
      if (btnSend) btnSend.disabled = !enabled;
      if (queryEl) queryEl.disabled = !enabled;
    }

    function clearAIResults() {
      pagClear('ai-search');
      resultsEl.innerHTML = '';
      clarifyEl.classList.add('hidden');
      clarifyEl.textContent = '';
      emptyEl.classList.add('hidden');
      emptyEl.textContent = '';
      if (noKeyEl) noKeyEl.classList.add('hidden');
    }

    function getLastMessages(limit) {
      if (_conversationMessages.length <= limit) return _conversationMessages.slice();
      return _conversationMessages.slice(_conversationMessages.length - limit);
    }

    function doAISearch() {
      var query = queryEl ? queryEl.value.trim() : '';
      if (!query) return;

      queryEl.value = '';
      queryEl.style.height = 'auto';

      _conversationMessages.push({ role: 'user', content: query });

      clearAIResults();
      resultsEl.innerHTML = makeSkeleton(3);
      setEnabled(false);

      var messagesToSend = getLastMessages(3);

      google.script.run
        .withSuccessHandler(function(response) {
          resultsEl.innerHTML = '';
          setEnabled(true);

          if (response && response.rawResponse) {
            _conversationMessages.push({ role: 'assistant', content: response.rawResponse });
          }

          handleAIResponse(response);
        })
        .withFailureHandler(function() {
          resultsEl.innerHTML = '';
          setEnabled(true);
          _conversationMessages.pop();
          emptyEl.textContent = 'Something went wrong. Please try again.';
          emptyEl.classList.remove('hidden');
        })
        .performAISearch(messagesToSend);
    }

    function handleAIResponse(response) {
      if (!response) {
        emptyEl.textContent = 'No response received. Please try again.';
        emptyEl.classList.remove('hidden');
        return;
      }

      if (response.type === 'error') {
        if (response.error === 'NO_API_KEY') {
          if (noKeyEl) noKeyEl.classList.remove('hidden');
          return;
        }
        emptyEl.textContent = response.error;
        emptyEl.classList.remove('hidden');
        return;
      }

      if (response.type === 'clarify') {
        clarifyEl.textContent = response.message || 'Could you be more specific?';
        clarifyEl.classList.remove('hidden');
        if (queryEl) queryEl.focus();
        return;
      }

      // Non-clarify response breaks the conversation chain
      _conversationMessages = [];

      // Arabic corpus search: run client-side against imlaei cache, show paginated results
      if (response.type === 'arabic_search') {
        var searchResults = searchImlaeiClient(response.query);
        if (!searchResults.length) {
          emptyEl.textContent = 'No exact matches found for that text.';
          emptyEl.classList.remove('hidden');
          return;
        }
        pagReset('ai-search', searchResults);
        pagRenderPage('ai-search', resultsEl, emptyEl, 'No exact matches found for that text.');
        return;
      }

      // References type: resolve against client-side caches
      // Consecutive range in one surah → preview mode (one card)
      // Non-consecutive or multi-surah → paginated search results mode
      if (response.type === 'references') {
        var refs = response.references || [];
        var resolved = _buildResultsFromReferences(refs);
        if (!resolved.length) {
          emptyEl.textContent = 'No verified results found. Try a different query.';
          emptyEl.classList.remove('hidden');
          return;
        }
        if (isConsecutiveRange(resolved)) {
          renderPreview(resultsEl, resolved);
        } else {
          pagReset('ai-search', resolved);
          pagRenderPage('ai-search', resultsEl, emptyEl, 'No verified results found. Try a different query.');
        }
        return;
      }

      emptyEl.textContent = 'Unexpected response. Please try again.';
      emptyEl.classList.remove('hidden');
    }

    setupTextarea(queryEl, doAISearch);
    if (btnSend) btnSend.addEventListener('click', doAISearch);
    if (resultsEl) resultsEl.addEventListener('click', onInsertClick);
  }

  function clearAISearch() {
    _conversationMessages = [];
    pagClear('ai-search');
    var queryEl = document.getElementById('ai-search-query');
    var resultsEl = document.getElementById('ai-search-results');
    var clarifyEl = document.getElementById('ai-search-clarify');
    var emptyEl = document.getElementById('ai-search-empty');
    var noKeyEl = document.getElementById('ai-no-key');
    if (queryEl) { queryEl.value = ''; queryEl.style.height = 'auto'; queryEl.focus(); }
    if (resultsEl) resultsEl.innerHTML = '';
    if (clarifyEl) { clarifyEl.classList.add('hidden'); clarifyEl.textContent = ''; }
    if (emptyEl) { emptyEl.classList.add('hidden'); emptyEl.textContent = ''; }
    if (noKeyEl) noKeyEl.classList.add('hidden');
  }

  // ─── Init ────────────────────────────────────────────────────────────────────

  function init() {
    var pendingInit = 6;
    function onInitDone() {
      if (--pendingInit <= 0) {
        var overlay = document.getElementById('startup-overlay');
        if (overlay) overlay.classList.add('hidden');
      }
    }

    google.script.run
      .withSuccessHandler(function(s) { onSettingsLoaded(s); onInitDone(); })
      .withFailureHandler(function() { applyFormatStateToUI(); onInitDone(); })
      .getSettings();

    google.script.run
      .withSuccessHandler(function(f) { onFontsLoaded(f); onInitDone(); })
      .withFailureHandler(function() { onInitDone(); })
      .getArabicFonts();

    ensureUthmaniCache(onInitDone, onInitDone);
    ensureTranslationCache(onInitDone, onInitDone);
    ensureImlaeiCache(onInitDone, onInitDone);
    ensureSurahMetaCache(onInitDone, onInitDone);

    initFormatBar();
    initSettings();
    initSettingsPanelHandlers();
    initTabNav();
    initDirectInsertTab();
    initExactSearchTab();
    initAISearchTab();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

  window.getFormatState = function() { return Object.assign({}, formatState); };
})();
</script>
