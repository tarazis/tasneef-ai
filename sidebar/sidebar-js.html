<script>
(function() {
  'use strict';

  var formatState = {
    fontName: 'Amiri',
    fontSize: 18,
    bold: false,
    textColor: '#000000'
  };

  var _settings = {};
  var saveDebounceTimer = null;
  var SAVE_DEBOUNCE_MS = 500;

  function debouncedSave() {
    if (saveDebounceTimer) clearTimeout(saveDebounceTimer);
    saveDebounceTimer = setTimeout(function() {
      google.script.run
        .withFailureHandler(function(err) { console.error('Save settings failed:', err); })
        .saveSettings({
          fontName: formatState.fontName,
          fontSize: formatState.fontSize,
          bold: formatState.bold,
          textColor: formatState.textColor
        });
      saveDebounceTimer = null;
    }, SAVE_DEBOUNCE_MS);
  }

  function applyFormatStateToUI() {
    var fontSelect = document.getElementById('font-select');
    var sizeSelect = document.getElementById('size-select');
    var boldBtn = document.getElementById('btn-bold');
    var colorPicker = document.getElementById('color-picker');
    var colorTrigger = document.getElementById('color-trigger');
    if (fontSelect) fontSelect.value = formatState.fontName;
    if (sizeSelect) {
      var sizeVal = String(formatState.fontSize);
      if (sizeSelect.querySelector('option[value="' + sizeVal + '"]')) {
        sizeSelect.value = sizeVal;
      } else {
        sizeSelect.value = '18';
      }
    }
    if (boldBtn) boldBtn.classList.toggle('active', formatState.bold);
    if (colorPicker) colorPicker.value = formatState.textColor;
    if (colorTrigger) colorTrigger.style.backgroundColor = formatState.textColor;
  }

  function initFormatBar() {
    var fontSelect = document.getElementById('font-select');
    var sizeSelect = document.getElementById('size-select');
    var boldBtn = document.getElementById('btn-bold');
    var colorTrigger = document.getElementById('color-trigger');
    var colorPicker = document.getElementById('color-picker');

    if (fontSelect) {
      fontSelect.addEventListener('change', function() {
        formatState.fontName = fontSelect.value;
        debouncedSave();
      });
    }

    if (sizeSelect) {
      sizeSelect.addEventListener('change', function() {
        formatState.fontSize = parseInt(sizeSelect.value, 10) || 18;
        debouncedSave();
      });
    }

    if (boldBtn) {
      boldBtn.addEventListener('click', function() {
        formatState.bold = !formatState.bold;
        boldBtn.classList.toggle('active', formatState.bold);
        debouncedSave();
      });
    }

    if (colorTrigger && colorPicker) {
      colorTrigger.addEventListener('click', function() {
        colorPicker.click();
      });
      function onColorChange() {
        formatState.textColor = colorPicker.value;
        colorTrigger.style.backgroundColor = colorPicker.value;
        debouncedSave();
      }
      colorPicker.addEventListener('input', onColorChange);
      colorPicker.addEventListener('change', onColorChange);
    }
  }

  function initSettings() {
    var btnSettings = document.getElementById('btn-settings');
    var btnClear = document.getElementById('btn-clear');
    var overlay = document.getElementById('settings-overlay');
    var btnBack = document.getElementById('btn-settings-back');

    if (btnSettings && overlay) {
      btnSettings.addEventListener('click', function() {
        overlay.classList.remove('hidden');
        loadSettingsIntoPanel();
      });
    }

    if (btnClear) {
      btnClear.addEventListener('click', clearConversation);
    }

    if (btnBack && overlay) {
      btnBack.addEventListener('click', function() {
        overlay.classList.add('hidden');
        refreshSettings();
      });
    }

    overlay.addEventListener('click', function(e) {
      if (e.target === overlay) {
        overlay.classList.add('hidden');
        refreshSettings();
      }
    });
  }

  function refreshSettings() {
    google.script.run.withSuccessHandler(function(s) {
      _settings = s;
    }).getSettings();
  }

  function loadSettingsIntoPanel() {
    google.script.run
      .withSuccessHandler(function(s) {
        var cursor = document.getElementById('insert-cursor');
        var lastparagraph = document.getElementById('insert-lastparagraph');
        var arabic = document.getElementById('insert-arabic');
        var trans = document.getElementById('insert-translation');
        var ref = document.getElementById('insert-reference');
        var apiKey = document.getElementById('claude-api-key');
        if (cursor) cursor.checked = s.insertMode === 'cursor';
        if (lastparagraph) lastparagraph.checked = s.insertMode === 'lastparagraph';
        if (arabic) arabic.checked = s.insertArabic !== false;
        if (trans) trans.checked = s.showTranslation !== false;
        if (ref) ref.checked = s.showReference !== false;
        if (apiKey) {
          google.script.run.withSuccessHandler(function(k) {
            apiKey.value = k || '';
            apiKey.placeholder = k ? '••••••••••' : 'sk-ant-...';
          }).getClaudeApiKey();
        }
      })
      .withFailureHandler(function() {})
      .getSettings();
  }

  function initSettingsPanelHandlers() {
    var btnSaveSettings = document.getElementById('btn-save-settings');
    var apiKeyInput = document.getElementById('claude-api-key');
    var overlay = document.getElementById('settings-overlay');

    if (btnSaveSettings) {
      btnSaveSettings.addEventListener('click', function() {
        var mode = document.querySelector('input[name="insertMode"]:checked');
        var pending = 0;
        var failed = false;

        function onComplete() {
          pending--;
          if (pending <= 0) {
            if (failed) {
              showToast('Save failed.');
            } else {
              showToast('Saved');
              refreshSettings();
              if (overlay) overlay.classList.add('hidden');
            }
          }
        }

        // Save settings
        pending++;
        google.script.run
          .withSuccessHandler(onComplete)
          .withFailureHandler(function(e) { console.error(e); failed = true; onComplete(); })
          .saveSettings({
            insertMode: mode ? mode.value : 'cursor',
            insertArabic: document.getElementById('insert-arabic').checked,
            showTranslation: document.getElementById('insert-translation').checked,
            showReference: document.getElementById('insert-reference').checked
          });

        // Save API key if present
        if (apiKeyInput) {
          var key = apiKeyInput.value.trim();
          if (key) {
            pending++;
            google.script.run
              .withSuccessHandler(onComplete)
              .withFailureHandler(function() { failed = true; onComplete(); })
              .setClaudeApiKey(key);
          }
        }
      });
    }
  }

  function onSettingsLoaded(settings) {
    _settings = settings;
    formatState.fontName = settings.fontName || 'Amiri';
    formatState.fontSize = settings.fontSize || 18;
    formatState.bold = settings.bold || false;
    formatState.textColor = settings.textColor || '#000000';
    applyFormatStateToUI();
  }

  function onFontsLoaded(fonts) {
    var fontSelect = document.getElementById('font-select');
    if (!fontSelect || !fonts || !fonts.length) return;
    fontSelect.innerHTML = '';
    fonts.forEach(function(f) {
      var opt = document.createElement('option');
      opt.value = f;
      opt.textContent = f;
      if (f === formatState.fontName) opt.selected = true;
      fontSelect.appendChild(opt);
    });
    if (formatState.fontName && !fonts.some(function(f){ return f === formatState.fontName; })) {
      var fallback = document.createElement('option');
      fallback.value = formatState.fontName;
      fallback.textContent = formatState.fontName;
      fallback.selected = true;
      fontSelect.insertBefore(fallback, fontSelect.firstChild);
    }
  }

  // ─── Unified Tab ────────────────────────────────────────────────────────────

  var ARABIC_INDIC_DIGITS = ['\u0660','\u0661','\u0662','\u0663','\u0664','\u0665','\u0666','\u0667','\u0668','\u0669'];
  function toArabicIndicClient(num) {
    return String(num).replace(/[0-9]/g, function(d) { return ARABIC_INDIC_DIGITS[+d]; });
  }

  var _conversationMessages = [];

  function clearConversation() {
    _conversationMessages = [];
    var resultsEl = document.getElementById('unified-results');
    var clarifyEl = document.getElementById('unified-clarify');
    var emptyEl = document.getElementById('unified-empty');
    var loadingEl = document.getElementById('unified-loading');
    var noKeyEl = document.getElementById('unified-no-key');
    var queryEl = document.getElementById('unified-query');
    if (resultsEl) resultsEl.innerHTML = '';
    if (clarifyEl) { clarifyEl.classList.add('hidden'); clarifyEl.textContent = ''; }
    if (emptyEl) { emptyEl.classList.add('hidden'); emptyEl.textContent = ''; }
    if (loadingEl) loadingEl.classList.add('hidden');
    if (noKeyEl) noKeyEl.classList.add('hidden');
    if (queryEl) { queryEl.value = ''; queryEl.focus(); }
  }

  function escapeHtml(s) {
    if (!s) return '';
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function showToast(message) {
    var toast = document.createElement('div');
    toast.textContent = message;
    toast.style.cssText = 'position:fixed;bottom:16px;left:50%;transform:translateX(-50%);' +
      'background:#333;color:#fff;padding:8px 14px;border-radius:4px;font-size:12px;' +
      'z-index:9999;pointer-events:none;opacity:1;transition:opacity 0.4s';
    document.body.appendChild(toast);
    setTimeout(function() {
      toast.style.opacity = '0';
      setTimeout(function() { toast.parentNode && toast.parentNode.removeChild(toast); }, 400);
    }, 1800);
  }

  function getLastMessages(limit) {
    if (_conversationMessages.length <= limit) return _conversationMessages.slice();
    return _conversationMessages.slice(_conversationMessages.length - limit);
  }

  function initUnifiedTab() {
    var queryEl = document.getElementById('unified-query');
    var btnSend = document.getElementById('btn-unified-send');
    var resultsEl = document.getElementById('unified-results');
    var clarifyEl = document.getElementById('unified-clarify');
    var emptyEl = document.getElementById('unified-empty');
    var loadingEl = document.getElementById('unified-loading');
    var noKeyEl = document.getElementById('unified-no-key');

    function setEnabled(enabled) {
      if (btnSend) btnSend.disabled = !enabled;
      if (queryEl) queryEl.disabled = !enabled;
    }

    function clearResults() {
      resultsEl.innerHTML = '';
      clarifyEl.classList.add('hidden');
      clarifyEl.textContent = '';
      emptyEl.classList.add('hidden');
      emptyEl.textContent = '';
      if (noKeyEl) noKeyEl.classList.add('hidden');
    }

    function doQuery() {
      var query = queryEl ? queryEl.value.trim() : '';
      if (!query) return;

      queryEl.value = '';
      queryEl.style.height = 'auto';

      _conversationMessages.push({ role: 'user', content: query });

      clearResults();
      loadingEl.classList.remove('hidden');
      setEnabled(false);

      var messagesToSend = getLastMessages(3);

      google.script.run
        .withSuccessHandler(function(response) {
          loadingEl.classList.add('hidden');
          setEnabled(true);

          if (response && response.rawResponse) {
            _conversationMessages.push({ role: 'assistant', content: response.rawResponse });
          }

          handleResponse(response);
        })
        .withFailureHandler(function() {
          loadingEl.classList.add('hidden');
          setEnabled(true);
          _conversationMessages.pop();
          emptyEl.textContent = 'Something went wrong. Please try again.';
          emptyEl.classList.remove('hidden');
        })
        .processUnifiedQuery(messagesToSend);
    }

    function handleResponse(response) {
      if (!response) {
        emptyEl.textContent = 'No response received. Please try again.';
        emptyEl.classList.remove('hidden');
        return;
      }

      if (response.type === 'error') {
        if (response.error === 'NO_API_KEY') {
          if (noKeyEl) noKeyEl.classList.remove('hidden');
          return;
        }
        emptyEl.textContent = response.error;
        emptyEl.classList.remove('hidden');
        return;
      }

      if (response.type === 'clarify') {
        clarifyEl.textContent = response.message || 'Could you be more specific?';
        clarifyEl.classList.remove('hidden');
        if (queryEl) queryEl.focus();
        return;
      }

      // Non-clarify response breaks the conversation chain
      _conversationMessages = [];

      var results = response.results || [];

      if (response.message && results.length === 0) {
        emptyEl.textContent = response.message;
        emptyEl.classList.remove('hidden');
        return;
      }

      if (results.length === 0) {
        emptyEl.textContent = 'No results found. Try a different query.';
        emptyEl.classList.remove('hidden');
        return;
      }

      renderResults(results, response.type);
    }

    function renderResults(results, type) {
      resultsEl.innerHTML = '';
      var font = formatState.fontName || 'Amiri';
      var showTrans = _settings.showTranslation !== false;

      results.forEach(function(r) {
        var card = document.createElement('div');
        card.className = 'result-card';

        var refLabel = (r.surahNameArabic || 'سورة') + ': ' + toArabicIndicClient(r.ayah);
        var arabicHtml = escapeHtml(r.arabicText);

        if (type === 'search' && r.matchStart != null && r.matchEnd != null && r.matchEnd > r.matchStart) {
          var before = escapeHtml(r.arabicText.substring(0, r.matchStart));
          var match = escapeHtml(r.arabicText.substring(r.matchStart, r.matchEnd));
          var after = escapeHtml(r.arabicText.substring(r.matchEnd));
          arabicHtml = before + '<mark>' + match + '</mark>' + after;
        }

        var html =
          '<div class="ref" dir="rtl">' + escapeHtml(refLabel) + '</div>' +
          '<div class="arabic" style="font-family:' + escapeHtml(font) + ',serif">' + arabicHtml + '</div>';

        if (showTrans && r.translationText) {
          var citationEn = (r.surahNameEnglish || '') + ' ' + r.surah + ':' + r.ayah;
          html += '<div class="translation">\u201C' + escapeHtml(r.translationText)
                + '\u201D <span class="citation">(' + escapeHtml(citationEn) + ')</span></div>';
        }

        html += '<button type="button" class="btn-primary btn-insert-result" ' +
          'data-surah="' + r.surah + '" data-ayah="' + r.ayah + '">Insert</button>';

        card.innerHTML = html;
        resultsEl.appendChild(card);
      });
    }

    function onInsertClick(e) {
      var btn = e.target;
      if (btn.tagName !== 'BUTTON' || !btn.classList.contains('btn-insert-result')) return;
      var surah = parseInt(btn.getAttribute('data-surah'), 10);
      var ayah = parseInt(btn.getAttribute('data-ayah'), 10);
      if (!surah || !ayah) return;

      btn.disabled = true;
      var style = _settings.arabicStyle || 'uthmani';

      google.script.run
        .withSuccessHandler(function(ayahData) {
          if (!ayahData) {
            btn.disabled = false;
            return;
          }
          var fs = window.getFormatState ? window.getFormatState() : {};
          google.script.run
            .withSuccessHandler(function() { btn.disabled = false; })
            .withFailureHandler(function(err) {
              btn.disabled = false;
              console.error('Insert failed:', err);
            })
            .insertAyah(ayahData, fs, _settings);
        })
        .withFailureHandler(function() {
          btn.disabled = false;
        })
        .getAyahForInsert(surah, ayah, style);
    }

    if (queryEl) {
      queryEl.addEventListener('input', function() {
        queryEl.style.height = 'auto';
        queryEl.style.height = Math.min(queryEl.scrollHeight, 120) + 'px';
      });

      queryEl.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          doQuery();
        }
      });
    }

    if (btnSend) btnSend.addEventListener('click', doQuery);
    if (resultsEl) resultsEl.addEventListener('click', onInsertClick);
  }

  // ─── Init ───────────────────────────────────────────────────────────────────

  function init() {
    google.script.run
      .withSuccessHandler(onSettingsLoaded)
      .withFailureHandler(function() { applyFormatStateToUI(); })
      .getSettings();

    google.script.run
      .withSuccessHandler(onFontsLoaded)
      .withFailureHandler(function() {})
      .getArabicFonts();

    initFormatBar();
    initSettings();
    initSettingsPanelHandlers();
    initUnifiedTab();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

  window.getFormatState = function() { return Object.assign({}, formatState); };
})();
</script>
